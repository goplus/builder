apiVersion: apps/v1
kind: Deployment
metadata:
  name: builder-account
  namespace: builder
  labels:
    app: builder-account
spec:
  replicas: 1
  selector:
    matchLabels:
      app: builder-account
  template:
    metadata:
      labels:
        app: builder-account
    spec:
      imagePullSecrets:
        - name: ghcr-nighca
      containers:
        - name: builder-account
          image: ghcr.io/goplus/builder/account:acc
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: builder-account
  namespace: builder
  labels:
    app: builder-account
spec:
  type: ClusterIP
  selector:
    app: builder-account
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: builder-account
  namespace: builder
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 300m
    nginx.ingress.kubernetes.io/proxy-buffering: 'off'
    nginx.ingress.kubernetes.io/proxy-http-version: '1.1'
    nginx.ingress.kubernetes.io/proxy-request-buffering: 'off'
spec:
  rules:
    - host: goplus-builder-account.qiniu.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: builder-account
                port:
                  number: 80
