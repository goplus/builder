name: Publish Docker image
on:
  push:
  pull_request:
jobs:
  publish-docker-image:
    name: Publish ${{ matrix.name }} Docker image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Builder
            dockerfile: ./spx-gui/build/Dockerfile
            tag: ghcr.io/${{ github.repository }}:dev
          - name: Account
            dockerfile: ./spx-gui/build/Dockerfile.account
            tag: ghcr.io/${{ github.repository }}/account:dev
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{github.token}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            NODE_ENV=staging
          provenance: false
          sbom: false
          push: ${{ github.event_name == 'push' && github.ref_name == 'dev' }}
          tags: |
            ${{ matrix.tag }}
