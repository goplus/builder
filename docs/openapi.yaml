        thumbnail:
          description: Thumbnail reference of the course series.
          type: string
          format: uri-reference
          examples:
            - kodo://xbuilder-usercontent-test/files/FvYyHLNrtx8qFHSwnLjEe57UA2fF-2824936
        description:
          description: Description of the course series.
          type: string
          examples:
            - A series of courses on XBuilder programming.
        courseIDs:
          description: Array of course IDs included in this series.
          type: array
          items:
            $ref: "#/components/schemas/Model/properties/id"
          examples:
            - ["1", "2", "3"]
        order:
          description: Order/priority of the course series for sorting.
          type: integer
          format: int32
          examples:
            - 1

    CopilotMessage:
      description: Message in a copilot conversation.
      oneOf:
        - $ref: "#/components/schemas/CopilotUserMessage"
        - $ref: "#/components/schemas/CopilotCopilotMessage"
        - $ref: "#/components/schemas/CopilotToolMessage"
      discriminator:
        propertyName: role
        mapping:
          user: "#/components/schemas/CopilotUserMessage"
          copilot: "#/components/schemas/CopilotCopilotMessage"
          tool: "#/components/schemas/CopilotToolMessage"

    CopilotMessageContent:
      description: Message content payload.
      type: object
      required:
        - type
        - text
      additionalProperties: false
      properties:
        type:
          description: Type of the message. For now, only `text` is supported.
          type: string
          enum:
            - text
          examples:
            - text
        text:
          description: Text content of the message.
          type: string
          minLength: 1
          maxLength: 40000
          examples:
            - Hello!

    CopilotUserMessage:
      description: User-authored message in a copilot conversation.
      type: object
      required:
        - role
        - content
      additionalProperties: false
      properties:
        role:
          description: Role of the message.
          type: string
          enum:
            - user
          examples:
            - user
        content:
          $ref: "#/components/schemas/CopilotMessageContent"

    CopilotCopilotMessage:
      description: |
        Copilot-authored message in a copilot conversation.

        `content`, `toolCalls`, or both may be present, but at least one of them must be included.
      type: object
      required:
        - role
      additionalProperties: false
      anyOf:
        - title: Text content message
          required:
            - content
        - title: Tool-call message
          required:
            - toolCalls
          properties:
            toolCalls:
              minItems: 1
      properties:
        role:
          description: Role of the message.
          type: string
          enum:
            - copilot
          examples:
            - copilot
        content:
          $ref: "#/components/schemas/CopilotMessageContent"
        toolCalls:
          description: Structured tool calls emitted by the copilot message.
          type: array
          items:
            $ref: "#/components/schemas/CopilotRequestToolCall"

    CopilotToolMessage:
      description: Tool result message in a copilot conversation.
      type: object
      required:
        - role
        - toolCallId
        - content
      additionalProperties: false
      properties:
        role:
          description: Role of the message.
          type: string
          enum:
            - tool
          examples:
            - tool
        toolCallId:
          description: Tool call identifier of the assistant tool call this result corresponds to.
          type: string
          minLength: 1
          examples:
            - call_1
        content:
          $ref: "#/components/schemas/CopilotMessageContent"

    CopilotMessageRequest:
      description: Request payload for copilot message generation endpoints.
      type: object
      required:
        - messages
      properties:
        messages:
          description: |
            Input messages.

            This request shape supports prior assistant `toolCalls` and tool result messages with `toolCallId`.
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/CopilotMessage"
          examples:
            - - role: user
                content:
                  type: text
                  text: Hello, world!
              - role: copilot
                toolCalls:
                  - id: call_1
                    type: function
                    function:
                      name: create_project
                      arguments: '{"name":"My Project"}'
              - role: tool
                toolCallId: call_1
                content:
                  type: text
                  text: '{"id":"project_123"}'
        tools:
          description: Tools available for the copilot to use.
          type: array
          items:
            $ref: "#/components/schemas/CopilotTool"
          examples:
            - - type: function
                function:
                  name: create_project
                  description: Create a new project.
                  parameters:
                    type: object
                    properties:
                      name:
                        type: string
                    required:
                      - name
                    additionalProperties: false

    CopilotRequestToolCall:
      description: Structured tool call supplied on a prior copilot message.
      type: object
      required:
        - id
        - type
        - function
      additionalProperties: false
      properties:
        id:
          description: Unique tool call identifier.
          type: string
          examples:
            - call_1
        type:
          description: Type of the tool call.
          type: string
          enum:
            - function
          examples:
            - function
        function:
          $ref: "#/components/schemas/CopilotRequestToolCallFunction"

    CopilotRequestToolCallFunction:
      description: Function payload of a structured tool call.
      type: object
      required:
        - name
        - arguments
      additionalProperties: false
      properties:
        name:
          description: Name of the function.
          type: string
          examples:
            - create_project
        arguments:
          description: JSON-stringified arguments for the function call.
          type: string
          examples:
            - '{"name":"My Project"}'

    CopilotSSETextDeltaEvent:
      description: Payload of a `text_delta` SSE event from `POST /copilot/messages`.
      type: object
      required:
        - text
      additionalProperties: false
      properties:
        text:
          description: Incremental assistant text fragment. Concatenate fragments in order.
          type: string
          examples:
            - Hello

    CopilotSSEToolCallDeltaEvent:
      description: |
        Payload of a `tool_call_delta` SSE event from `POST /copilot/messages`.

        Merge fragments by `index` to reconstruct one entry in assistant `toolCalls`.
      type: object
      required:
        - index
      additionalProperties: false
      properties:
        index:
          description: Zero-based tool call position within the assistant message's `toolCalls` array.
          type: integer
          format: int64
          minimum: 0
          examples:
            - 0
        id:
          description: Tool call identifier fragment, present when emitted by the provider for this delta.
          type: string
          examples:
            - call_1
        function:
          $ref: "#/components/schemas/CopilotSSEToolCallDeltaFunction"

    CopilotSSEToolCallDeltaFunction:
      description: Incremental function fragment nested inside a `tool_call_delta` event.
      type: object
      additionalProperties: false
      properties:
        name:
          description: Function name fragment, usually emitted once near the start of the tool call.
          type: string
          examples:
            - list_projects
        arguments:
          description: JSON-stringified arguments fragment for the tool call.
          type: string
          examples:
            - '{"query":"demo"}'

    CopilotSSEDoneEvent:
      description: Payload of a terminal `done` SSE event from `POST /copilot/messages`.
      type: object
      required:
        - finishReason
      additionalProperties: false
      properties:
        finishReason:
          description: Provider finish reason for the completed assistant turn.
          type: string
          examples:
            - stop
            - tool_calls

    CopilotSSEErrorEvent:
      description: Payload of a terminal `error` SSE event from `POST /copilot/messages`.
      type: object
      required:
        - reason
        - message
      additionalProperties: false
      properties:
        reason:
          description: Machine-readable error reason for programmatic handling.
          type: string
          examples:
            - streamFailed
        message:
          description: Human-readable streaming error message.
          type: string
          examples:
            - stream failed

    CopilotTool:
      description: Tool available for copilot to use.
      type: object
      required:
        - type
        - function
      properties:
        type:
          description: Type of the tool.
          type: string
          enum:
            - function
          examples:
            - function
        function:
          type: object
          required:
            - name
          properties:
            name:
              description: Name of the function.
              type: string
              maxLength: 64
              pattern: "^[a-zA-Z0-9_-]{1,64}$"
              examples:
                - create_project
            description:
              description: Description of the function.
              type: string
              examples:
                - create project
            parameters:
              description: JSON Schema object that describes the function parameters.
              type: object
              examples:
                - type: object
                  properties:
                    name:
                      type: string
                  required:
                    - name
                  additionalProperties: false

    AIInteractionTurn:
      description: Single turn in an AI interaction session.
      type: object
      properties:
        requestContent:
          description: User's input text for the turn.
          type: string
          examples:
            - It's your turn.
        context:
          description: Context for the user's input text for the turn.
          type: object
          additionalProperties: true
          examples:
            - position: [10, 20]
              health: 80
        responseText:
          description: AI's text output for the turn.
          type: string
          examples:
            - Okay, let me see...
        responseCommandName:
          description: Command requested by the AI in the response.
          type: string
          examples:
            - MakeMove
        responseCommandArgs:
          description: Arguments for the command requested by the AI.
          type: object
          additionalProperties: true
          examples:
            - Row: 1
              Col: 1
              Result: ""
        executedCommandResult:
          description: Result of executing the command requested in the response.
          type:
            - object
            - "null"
          properties:
            success:
              description: Indicates if the command execution was successful.
              type: boolean
              examples:
                - true
            errorMessage:
              description: Error details if execution failed.
              type: string
              examples:
                - Invalid move parameters
            isBreak:
              description: Indicates if the interaction should be terminated.
              type: boolean
              examples:
                - false
        isInitial:
          description: Indicates whether this turn is the initial turn of an interaction sequence.
          type: boolean
          examples:
            - true

    AIGCTask:
      description: AIGC task object.
      type: object
      required:
        - id
        - createdAt
        - updatedAt
        - type
        - status
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        updatedAt:
          $ref: "#/components/schemas/Model/properties/updatedAt"
        type:
          description: Type of AIGC task.
          type: string
          enum:
            - removeBackground
            - generateCostume
            - generateAnimationVideo
            - extractVideoFrames
            - generateBackdrop
          examples:
            - removeBackground
        status:
          description: Current status of the AIGC task.
          type: string
          enum:
            - pending
            - processing
            - cancelling
            - completed
            - cancelled
            - failed
          examples:
            - processing
        result:
          description: Task result. Only available when status is completed.
          anyOf:
            - title: removeBackground
              type: object
              required:
                - imageUrl
              properties:
                imageUrl:
                  description: Universal URL of the image with background removed (e.g. kodo://bucket/key).
                  type: string
                  format: uri
            - title: generateCostume
              type: object
              required:
                - imageUrls
              properties:
                imageUrls:
                  description: Universal URLs of the generated costume images (e.g. kodo://bucket/key).
                  type: array
                  items:
                    type: string
                    format: uri
            - title: generateAnimationVideo
              type: object
              required:
                - videoUrl
              properties:
                videoUrl:
                  description: Universal URL of the generated animation video (e.g. kodo://bucket/key).
                  type: string
                  format: uri
            - title: extractVideoFrames
              type: object
              required:
                - frameUrls
              properties:
                frameUrls:
                  description: Universal URLs of the extracted frame images (e.g. kodo://bucket/key).
                  type: array
                  items:
                    type: string
                    format: uri
            - title: generateBackdrop
              type: object
              required:
                - imageUrls
              properties:
                imageUrls:
                  description: Universal URLs of the generated backdrop images (e.g. kodo://bucket/key).
                  type: array
                  items:
                    type: string
                    format: uri
        error:
          description: Error details. Only available when status is failed.
          type: object
          required:
            - reason
            - message
          properties:
            reason:
              description: Machine-readable error reason for programmatic handling.
              type: string
              enum:
                - invalidInput
                - contentPolicyViolation
                - generationFailed
                - timeout
                - serviceUnavailable
                - internalError
              examples:
                - contentPolicyViolation
            message:
              description: Human-readable error message.
              type: string
              examples:
                - Generation failed due to content policy violation

    AIGCArtStyle:
      description: Art style of projects or assets.
      type: string
      enum:
        - pixel-art
        - flat-design
        - hand-drawn
        - low-poly
        - ghibli
        - unspecified
      examples:
        - pixel-art

    AIGCPerspective:
      description: Viewing perspectives for projects or assets.
      type: string
      enum:
        - angled-top-down
        - side-scrolling
        - unspecified
      examples:
        - side-scrolling

    AIGCProjectSettings:
      description: Settings of project for assets generation.
      type: object
      properties:
        name:
          description: Name of the project.
          type: string
          maxLength: 100
          examples:
            - My First Project
        description:
          description: Description of the project.
          type: string
          examples:
            - A simple project.
        artStyle:
          $ref: "#/components/schemas/AIGCArtStyle"
        perspective:
          $ref: "#/components/schemas/AIGCPerspective"

    AIGCAssetBaseSettings:
      description: Base settings shared by all asset types.
      type: object
      properties:
        name:
          description: Name of the asset.
          type: string
          maxLength: 100
          examples:
            - Fire Demon
        description:
          description: Description of the asset.
          type: string
          examples:
            - A fire demon character with glowing ember cracks

    AIGCGraphicAssetSettings:
      description: Settings for graphic assets, extending base settings with graphic properties.
      allOf:
        - $ref: "#/components/schemas/AIGCAssetBaseSettings"
        - type: object
          properties:
            artStyle:
              $ref: "#/components/schemas/AIGCArtStyle"
            perspective:
              $ref: "#/components/schemas/AIGCPerspective"

    AIGCSpriteSettings:
      description: Settings for generating a sprite asset.
      allOf:
        - $ref: "#/components/schemas/AIGCGraphicAssetSettings"
        - type: object
          properties:
            category:
              description: Sprite category.
              type: string
              enum:
                - character
                - item
                - effect
                - ui
                - unspecified

    AIGCCostumeSettings:
      description: Settings for generating a costume asset.
      allOf:
        - $ref: "#/components/schemas/AIGCGraphicAssetSettings"
        - type: object
          properties:
            referenceImageUrl:
              description: Universal URL of the reference image to guide the costume generation (e.g. kodo://bucket/key).
              type:
                - string
                - "null"
              format: uri
            facing:
              description: Direction the costume is facing.
              type: string
              enum:
                - front
                - back
                - left
                - right
                - unspecified

    AIGCAnimationSettings:
      description: Settings for generating an animation asset.
      allOf:
        - $ref: "#/components/schemas/AIGCGraphicAssetSettings"
        - type: object
          required:
            - loopMode
          properties:
            referenceFrameUrl:
              description: Universal URL of the reference frame image to guide the animation generation (e.g. kodo://bucket/key).
              type:
                - string
                - "null"
              format: uri
            loopMode:
              description: Whether the animation is loopable or non-loopable.
              type: string
              enum:
                - loopable
                - non-loopable

    AIGCBackdropSettings:
      description: Settings for generating a backdrop asset.
      allOf:
        - $ref: "#/components/schemas/AIGCGraphicAssetSettings"
        - type: object
          properties:
            category:
              description: Backdrop category.
              type: string
              enum:
                - ui
                - unspecified

    UpInfo:
      description: Upload credentials and configuration.
      type: object
      required:
        - token
        - expiresAt
        - maxSize
        - bucket
        - region
      properties:
        token:
          description: Upload token used for authenticating upload requests.
          type: string
          examples:
            - MY_ACCESS_KEY:wQ4ofysef1R7IKnrziqtomqyDvI=:eyJzY29wZSI6Im15LWJ1Y2tldDpzdW5mbG93ZXIuanBnIiwiZGVhZGxpbmUiOjE0NTE0OTEyMDAsInJldHVybkJvZHkiOiJ7XCJuYW1lXCI6JChmbmFtZSksXCJzaXplXCI6JChmc2l6ZSksXCJ3XCI6JChpbWFnZUluZm8ud2lkdGgpLFwiaFwiOiQoaW1hZ2VJbmZvLmhlaWdodCksXCJoYXNoXCI6JChldGFnKX0ifQ==
        expiresAt:
          description: Expiration timestamp of the upload token.
          type: string
          format: date-time
          examples:
            - 2006-01-02T15:04:05+07:00
        maxSize:
          description: Maximum allowed file size in bytes.
          type: integer
          format: int64
          examples:
            - 26214400
        bucket:
          description: Name of the Qiniu Kodo bucket where files will be uploaded.
          type: string
          examples:
            - xbuilder-usercontent-test
        region:
          description: Region of the Qiniu Kodo bucket.
          type: string
          examples:
            - z0

    InputText:
      description: Text input for multimodal content.
      type: object
      required:
        - type
        - text
      additionalProperties: false
      properties:
        type:
          description: Content type identifier.
          type: string
          enum:
            - inputText
          examples:
            - inputText
        text:
          description: The text content.
          type: string
          minLength: 1
          maxLength: 2000
          examples:
            - "Generate a description for a sprite named 'Tornado'."

    InputImage:
      description: Image input for multimodal content.
      type: object
      required:
        - type
        - imageUrl
      additionalProperties: false
      properties:
        type:
          description: Content type identifier.
          type: string
          enum:
            - inputImage
          examples:
            - inputImage
        imageUrl:
          description: |
            Base64-encoded PNG image data URL.

            All images must be provided as PNG format. If you have images in other formats (SVG, JPEG, WebP),
            convert them to PNG before sending.

            Maximum image size: 5 MB (after decoding the base64 content).

            Format: `data:image/png;base64,<base64_data>`
          type: string
          format: uri
          minLength: 1
          maxLength: 7000000
          examples:
            - "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="

    ByPage:
      description: Paginated response wrapper.
      type: object
      required:
        - total
        - data
      properties:
        total:
          description: Total number of result items in the result set.
          type: integer
          format: int64
          minimum: 0
        data:
          description: Array of result items.
          type: array
          items:
            type: object

  parameters:
    SortOrder:
      name: sortOrder
      description: Order in which to sort the results.
      in: query
      schema:
        type: string
        enum:
          - asc
          - desc
        default: asc
        examples:
          - asc

    PageIndex:
      name: pageIndex
      description: Index of the page to retrieve.
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 1
        examples:
          - 1

    PageSize:
      name: pageSize
      description: Number of items per page.
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
        examples:
          - 20
