      operationId: deleteAdminAccountSession
      tags:
        - Account Admin
      summary: Delete an account session as admin
      description: |
        Revoke an account session.

        Requires the `accountAdmin` role.
      parameters:
        - name: sessionID
          description: ID of the account session to delete.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
      responses:
        "204":
          description: Account session deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
        "404":
          description: Account session not found.

  /admin/account/apps:
    get:
      operationId: listAdminAccountApps
      tags:
        - Account Admin
      summary: List account apps as admin
      description: |
        Retrieve account apps registered for first-party app SSO.

        Requires the `accountAdmin` role.
      parameters:
        - name: orderBy
          description: Field by which to order the results.
          in: query
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
            default: createdAt
            examples:
              - createdAt
        - $ref: "#/components/parameters/SortOrder"
        - $ref: "#/components/parameters/PageIndex"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    $ref: "#/components/schemas/ByPage/properties/total"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountApp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
    post:
      operationId: createAdminAccountApp
      tags:
        - Account Admin
      summary: Create an account app as admin
      description: |
        Register an account app for first-party app SSO.

        Requires the `accountAdmin` role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - displayName
                - clientType
                - redirectURIs
              properties:
                name:
                  $ref: "#/components/schemas/AccountApp/properties/name"
                displayName:
                  $ref: "#/components/schemas/AccountApp/properties/displayName"
                clientType:
                  $ref: "#/components/schemas/AccountApp/properties/clientType"
                redirectURIs:
                  $ref: "#/components/schemas/AccountApp/properties/redirectURIs"
                allowedOrigins:
                  $ref: "#/components/schemas/AccountApp/properties/allowedOrigins"
      responses:
        "201":
          description: Account app created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountApp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.

  /admin/account/apps/{appID}:
    get:
      operationId: getAdminAccountApp
      tags:
        - Account Admin
      summary: Get an account app as admin
      description: |
        Retrieve an account app registered for first-party app SSO.

        Requires the `accountAdmin` role.
      parameters:
        - name: appID
          description: ID of the app to get.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountApp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
        "404":
          description: Account app not found.
    patch:
      operationId: updateAdminAccountApp
      tags:
        - Account Admin
      summary: Update an account app as admin
      description: |
        Update an account app registered for first-party app SSO.

        Requires the `accountAdmin` role.
      parameters:
        - name: appID
          description: ID of the app to update.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                displayName:
                  $ref: "#/components/schemas/AccountApp/properties/displayName"
                status:
                  $ref: "#/components/schemas/AccountApp/properties/status"
                redirectURIs:
                  $ref: "#/components/schemas/AccountApp/properties/redirectURIs"
                allowedOrigins:
                  $ref: "#/components/schemas/AccountApp/properties/allowedOrigins"
      responses:
        "200":
          description: Account app updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountApp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
        "404":
          description: Account app not found.

  /admin/account/apps/{appID}/secrets:
    get:
      operationId: listAdminAccountAppSecrets
      tags:
        - Account Admin
      summary: List account app secrets as admin
      description: |
        Retrieve a list of secrets configured for a confidential account app.

        Requires the `accountAdmin` role.
      parameters:
        - name: appID
          description: ID of the app whose secrets are listed.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
        - $ref: "#/components/parameters/PageIndex"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    $ref: "#/components/schemas/ByPage/properties/total"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountAppSecret"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
        "404":
          description: Account app not found.
    post:
      operationId: createAdminAccountAppSecret
      tags:
        - Account Admin
      summary: Create an account app secret as admin
      description: |
        Create a secret for a confidential account app. The secret value is only returned once.

        Requires the `accountAdmin` role.
      parameters:
        - name: appID
          description: ID of the app whose secret is created.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  $ref: "#/components/schemas/AccountAppSecret/properties/name"
      responses:
        "201":
          description: Account app secret created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedAccountAppSecret"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
        "404":
          description: Account app not found.

  /admin/account/apps/{appID}/secrets/{secretID}:
    delete:
      operationId: deleteAdminAccountAppSecret
      tags:
        - Account Admin
      summary: Delete an account app secret as admin
      description: |
        Delete a secret from a confidential account app.

        Requires the `accountAdmin` role.
      parameters:
        - name: appID
          description: ID of the app whose secret is deleted.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
        - name: secretID
          description: ID of the secret to delete.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
      responses:
        "204":
          description: Account app secret deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
        "404":
          description: Account app or secret not found.

  /admin/authorization/users/{userID}:
    get:
      operationId: getAdminUserAuthorization
      tags:
        - Authorization Admin
      summary: Get authorization for a user as admin
      description: |
        Retrieve authorization inputs and derived capabilities for a user.

        Requires the `authorizationAdmin` role.
      parameters:
        - name: userID
          description: ID of the user whose authorization is retrieved.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthorization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
        "404":
          description: User authorization not found.
    patch:
      operationId: updateAdminUserAuthorization
      tags:
        - Authorization Admin
      summary: Update authorization for a user as admin
      description: |
        Update authorization inputs for a user.

        Requires the `authorizationAdmin` role.
      parameters:
        - name: userID
          description: ID of the user whose authorization is updated.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                roles:
                  $ref: "#/components/schemas/UserAuthorization/properties/roles"
                plan:
                  $ref: "#/components/schemas/UserAuthorization/properties/plan"
      responses:
        "200":
          description: User authorization updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthorization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.
        "404":
          description: User authorization not found.

  /admin/audit-logs:
    get:
      operationId: listAdminAuditLogs
      tags:
        - Admin Audit
      summary: List audit logs as admin
      description: |
        Retrieve admin audit logs.

        Requires admin permissions. Backend RBAC determines which audit events are visible to the current admin user.
      parameters:
        - name: createdAfter
          description: Filter audit logs created after this timestamp.
          in: query
          schema:
            type: string
            format: date-time
        - name: createdBefore
          description: Filter audit logs created before this timestamp.
          in: query
          schema:
            type: string
            format: date-time
        - name: orderBy
          description: Field by which to order the results.
          in: query
          schema:
            type: string
            enum:
              - createdAt
            default: createdAt
            examples:
              - createdAt
        - $ref: "#/components/parameters/SortOrder"
        - $ref: "#/components/parameters/PageIndex"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    $ref: "#/components/schemas/ByPage/properties/total"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient permissions to perform this operation.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Opaque
      description: |
        Opaque access token, in the format `Bearer {token}`.

        For XBuilder Account OAuth flows, app-scoped access tokens are issued by `/account/oauth/token` and can be
        validated with `/account/oauth/introspect`.
    accountSessionCookie:
      type: apiKey
      in: cookie
      name: __Host-xbuilder-account-session
      description: |
        Account session cookie used by Account Web.

        The cookie must be `HttpOnly`, `Secure`, `SameSite=Lax`, use `Path=/`, and omit `Domain`.

        Cookie-authenticated mutation endpoints must validate Origin or use equivalent CSRF protection.
    oauthClientSecretBasic:
      type: http
      scheme: basic
      description: OAuth client authentication using client secret basic.

  responses:
    MovedPermanently:
      description: Requested resource moved to its canonical route.
      headers:
        Location:
          description: Canonical route of the requested resource.
          schema:
            type: string
            format: uri-reference
            minLength: 1
        Cache-Control:
          description: |
            Cache policy for canonical redirects.

            `no-cache` requires revalidation before reuse because non-canonical routes may later be reused by different
            resources.
          schema:
            type: string
            example: no-cache
    ResourceMoved:
      description: |
        Requested resource moved to its canonical route.

        Returned on non-`GET` and non-`HEAD` requests.

        The response includes a `canonical` payload with the canonical route.

        Clients may update the request and resubmit it explicitly.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MovedResourceError"
    Unauthorized:
      description: Unauthorized. Authentication required.
    OAuthError:
      description: OAuth error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAuthError"
    OAuthInvalidClient:
      description: OAuth client authentication failed.
      headers:
        WWW-Authenticate:
          description: Client authentication challenge.
          schema:
            type: string
            examples:
              - Basic realm="XBuilder Account"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAuthError"
    OAuthInsufficientScope:
      description: OAuth bearer token does not have the required scope.
      headers:
        WWW-Authenticate:
          description: Bearer token insufficient scope challenge.
          schema:
            type: string
            examples:
              - Bearer realm="XBuilder Account", error="insufficient_scope", scope="account:user:read"
              - Bearer realm="XBuilder Account", error="insufficient_scope", scope="account:user:write"
    OAuthUnsupportedMediaType:
      description: |
        OAuth form request content type is not supported.

        The server returns an OAuth `invalid_request` error before reading form-body OAuth parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAuthError"
    AccountUnauthorized:
      description: |
        Account authentication is required.

        The request may authenticate with an account session cookie or an OAuth bearer token. When OAuth bearer token
        authentication fails, the response includes `WWW-Authenticate`.
      headers:
        WWW-Authenticate:
          description: Bearer token challenge returned for OAuth bearer token authentication failures.
          schema:
            type: string
            examples:
              - Bearer realm="XBuilder Account"
              - Bearer realm="XBuilder Account", error="invalid_token"

  schemas:
    Model:
      type: object
      description: Base model with common fields for all entities.
      required:
        - id
        - createdAt
        - updatedAt
      properties:
        id:
          description: Unique positive int64 identifier serialized as a canonical decimal string.
          type: string
          minLength: 1
          maxLength: 19
          pattern: "^[1-9][0-9]{0,18}$"
          examples:
            - "1"
        createdAt:
          description: Creation timestamp.
          type: string
          format: date-time
          examples:
            - 2006-01-02T15:04:05+07:00
        updatedAt:
          description: Last update timestamp.
          type: string
          format: date-time
          examples:
            - 2006-01-02T15:04:05+07:00

    MovedResourceCanonical:
      description: |
        Canonical route information for a moved resource.

        User routes include `path` and `username`.

        Project routes include `path`, `owner`, and `name`.

        Project release routes include `path`, `owner`, `name`, and `release`.
      type: object
      required:
        - path
      properties:
        path:
          description: Canonical route path of the requested resource.
          type: string
          format: uri-reference
          minLength: 1
          examples:
            - /projects/john/NiuXiaoQi
        username:
          description: Canonical username of the moved user route.
          $ref: "#/components/schemas/User/properties/username"
          examples:
            - john
        owner:
          description: Canonical owner username of the moved project or project release route.
          $ref: "#/components/schemas/User/properties/username"
          examples:
            - john
        name:
          description: Canonical project name of the moved project or project release route.
          $ref: "#/components/schemas/Project/properties/name"
          examples:
            - NiuXiaoQi
        release:
          description: Canonical release name of the moved project release route.
          $ref: "#/components/schemas/ProjectRelease/properties/name"
          examples:
            - v1.2.3

    MovedResourceError:
      description: Error payload for a moved resource route.
      type: object
      required:
        - code
        - msg
        - canonical
      properties:
        code:
          description: Stable error code for moved resources.
          type: integer
          format: int32
          enum:
            - 40901
        msg:
          description: Human-readable moved resource error message.
          type: string
          enum:
            - Resource moved
        canonical:
          $ref: "#/components/schemas/MovedResourceCanonical"

    Visibility:
      description: Visibility setting for resources.
      type: string
      enum:
        - private
        - public
      examples:
        - private

    User:
      description: User account information.
      type: object
      required:
        - id
        - createdAt
        - updatedAt
        - username
        - displayName
        - avatar
        - description
        - plan
        - followerCount
        - followingCount
        - projectCount
        - publicProjectCount
        - likedProjectCount
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        updatedAt:
          $ref: "#/components/schemas/Model/properties/updatedAt"
        username:
          description: Unique username of the user.
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[A-Za-z0-9_-]{1,100}$"
          examples:
            - john
        displayName:
          description: Display name of the user.
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - John Doe
        avatar:
          description: Public URL or universal URL of the user's avatar image.
          type: string
          format: uri
          examples:
            - https://avatars.example.com/users/10137.png
        description:
          description: Brief bio or description of the user.
          type: string
          examples:
            - Two giants live in Britain's land...
        plan:
          description: Subscription plan of the user.
          type: string
          enum:
            - free
            - plus
          examples:
            - free
        followerCount:
          description: Number of followers the user has.
          type: integer
          format: int64
          minimum: 0
          examples:
            - 1
        followingCount:
          description: Number of users the user is following.
          type: integer
          format: int64
          minimum: 0
          examples:
            - 1
        projectCount:
          description: Total number of projects created by the user.
          type: integer
          format: int64
          minimum: 0
          examples:
            - 1
        publicProjectCount:
          description: Number of public projects created by the user.
          type: integer
          format: int64
          minimum: 0
          examples:
            - 1
        likedProjectCount:
          description: Number of projects liked by the user.
          type: integer
          format: int64
          minimum: 0
          examples:
            - 1
        capabilities:
          description: |
            Capabilities of the user.

            **This field is only present for the authenticated user's own profile.**
          $ref: "#/components/schemas/UserCapabilities"

    AuthenticatedUser:
      description: Authenticated user account information.
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          required:
            - capabilities

    UserCapabilities:
      type: object
      description: User permission capabilities.
      required:
        - canManageAssets
        - canManageCourses
        - canUsePremiumLLM
      properties:
        canManageAssets:
          description: Whether the user can manage asset library.
          type: boolean
          examples:
            - true
        canManageCourses:
          description: Whether the user can manage courses and course series.
          type: boolean
          examples:
            - true
        canUsePremiumLLM:
          description: Whether the user can access premium LLM models.
          type: boolean
          examples:
            - true

    AccountUser:
      description: User fields exposed by XBuilder Account.
      type: object
      required:
        - id
        - createdAt
        - updatedAt
        - username
        - displayName
        - avatar
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        updatedAt:
          $ref: "#/components/schemas/Model/properties/updatedAt"
        username:
          $ref: "#/components/schemas/User/properties/username"
        displayName:
          $ref: "#/components/schemas/User/properties/displayName"
        avatar:
          description: Public HTTP URL of the user's avatar image.
          type: string
          format: uri
          pattern: "^https?://"
          examples:
            - https://avatars.example.com/users/10137.png

    AccountIdentityProvider:
      type: object
      description: Identity provider available for hosted sign-in.
      required:
        - name
        - displayName
        - enabled
      properties:
        name:
          description: Identity provider name.
          type: string
          enum:
            - wechat
            - qq
            - github
            - apple
            - google
            - x
          examples:
            - github
        displayName:
          description: Display name of the identity provider.
          type: string
          examples:
            - GitHub
        enabled:
          description: Whether the identity provider is currently available for hosted sign-in.
          type: boolean
          examples:
            - true

    AccountUserIdentity:
      type: object
      description: Third-party identity linked to a user.
      required:
        - id
        - createdAt
        - updatedAt
        - provider
        - subject
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        updatedAt:
          $ref: "#/components/schemas/Model/properties/updatedAt"
        provider:
          $ref: "#/components/schemas/AccountIdentityProvider/properties/name"
        subject:
          description: Stable provider subject.
          type: string
          minLength: 1
        subjectNamespace:
          description: Provider subject namespace when needed for provider-scoped identifiers.
          type:
            - string
            - "null"
        displayName:
          description: Provider display name retained for display and troubleshooting.
          type:
            - string
            - "null"
        avatar:
          description: Provider avatar URL retained for display and troubleshooting.
          type:
            - string
            - "null"
          format: uri

    AccountSession:
      type: object
      description: Account session used by hosted sign-in and SSO continuity.
      required:
        - id
        - createdAt
        - updatedAt
        - lastUsedAt
        - expiresAt
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        updatedAt:
          $ref: "#/components/schemas/Model/properties/updatedAt"
        lastUsedAt:
          description: Timestamp when the account session was last used.
          type: string
          format: date-time
          examples:
            - 2006-01-02T15:04:05+07:00
        expiresAt:
          description: Expiration timestamp.
          type: string
          format: date-time
          examples:
            - 2006-01-02T15:04:05+07:00
        userAgent:
          description: User agent associated with the account session.
          type:
            - string
            - "null"
        ipAddress:
          description: IP address associated with the account session.
          type:
            - string
            - "null"

    CreateAccountSessionRequest:
      type: object
      description: Request to create an account session with an administrator-managed password.
      required:
        - username
        - password
      properties:
        username:
          description: Username for password sign-in.
          $ref: "#/components/schemas/AccountUser/properties/username"
        password:
          description: Administrator-managed password.
          type: string
          minLength: 1
          maxLength: 128

    CurrentAccountSession:
      type: object
      description: Current account session.
      required:
        - id
        - createdAt
        - updatedAt
        - lastUsedAt
        - expiresAt
        - user
      properties:
        id:
          $ref: "#/components/schemas/AccountSession/properties/id"
        createdAt:
          $ref: "#/components/schemas/AccountSession/properties/createdAt"
        updatedAt:
          $ref: "#/components/schemas/AccountSession/properties/updatedAt"
        lastUsedAt:
          $ref: "#/components/schemas/AccountSession/properties/lastUsedAt"
        expiresAt:
          $ref: "#/components/schemas/AccountSession/properties/expiresAt"
        user:
          $ref: "#/components/schemas/AccountUser"
        userAgent:
          $ref: "#/components/schemas/AccountSession/properties/userAgent"
        ipAddress:
          $ref: "#/components/schemas/AccountSession/properties/ipAddress"

    AccountApp:
      type: object
      description: Registered app for first-party app SSO.
      required:
        - id
        - createdAt
        - updatedAt
        - name
        - displayName
        - clientType
        - status
        - redirectURIs
        - allowedOrigins
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        updatedAt:
          $ref: "#/components/schemas/Model/properties/updatedAt"
        name:
          description: Unique app name.
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[A-Za-z0-9_-]{1,100}$"
          examples:
            - xbuilder
        displayName:
          description: Display name of the app.
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - XBuilder
        clientType:
          description: OAuth client type of the app.
          type: string
          enum:
            - public
            - confidential
          examples:
            - public
        status:
          description: App status.
          type: string
          enum:
            - active
            - disabled
          examples:
            - active
        redirectURIs:
          description: |
            Allowed redirect URIs.

            The server must require exact redirect URI matching. Production web redirect URIs must use `https`.

            Native app and loopback exceptions must be explicitly registered and validated by client type.
          type: array
          minItems: 1
          items:
            type: string
            format: uri
        allowedOrigins:
          description: |
            Allowed web origins.

            Production web origins must use `https`, must not include path, query, or fragment, and must be matched
            exactly by the server.
          type: array
          items:
            type: string
            format: uri

    AccountAppSecret:
      type: object
      description: OAuth client secret metadata for a confidential app.
      required:
        - id
        - createdAt
        - name
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        name:
          description: App secret name.
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - production

    CreatedAccountAppSecret:
      description: OAuth client secret created response including the one-time secret value.
      allOf:
        - $ref: "#/components/schemas/AccountAppSecret"
        - type: object
          required:
            - value
          properties:
            value:
              description: One-time app secret value.
              type: string
              minLength: 1

    OAuthClientID:
      description: OAuth client ID of the app.
      type: string
      minLength: 1
      maxLength: 19
      pattern: "^[1-9][0-9]{0,18}$"
      examples:
        - "1"

    OAuthPKCECodeChallenge:
      description: PKCE code challenge.
      type: string
      minLength: 43
      maxLength: 128
      pattern: "^[A-Za-z0-9._~-]{43,128}$"

    OAuthPKCECodeVerifier:
      description: PKCE code verifier.
      type: string
      minLength: 43
      maxLength: 128
      pattern: "^[A-Za-z0-9._~-]{43,128}$"

    OAuthScope:
      description: Space-delimited Account API OAuth scopes supported by XBuilder Account.
      type: string
      minLength: 1
      pattern: "^(account:user:read|account:user:write|account:user:read account:user:write|account:user:write account:user:read)$"
      examples:
        - account:user:read
        - account:user:write
        - account:user:read account:user:write

    OAuthPushedAuthorizationResponse:
      type: object
      description: Pushed authorization request response.
      required:
        - request_uri
        - expires_in
      properties:
        request_uri:
          description: |
            Opaque pushed authorization request URI.

            The value is a short-lived, single-use reference and is not a dereferenceable URL.
          type: string
          format: uri
          minLength: 1
          examples:
            - urn:ietf:params:oauth:request_uri:6esc_11ACC5bwc014ltc14eY22c
        expires_in:
          description: Lifetime of the pushed authorization request in seconds.
          type: integer
          format: int64
          minimum: 1
          examples:
            - 600

    CreateOAuthTokenRequest:
      description: Request to create or refresh Account-issued app-scoped OAuth tokens.
      oneOf:
        - $ref: "#/components/schemas/CreateAuthorizationCodeOAuthTokenRequest"
        - $ref: "#/components/schemas/CreateRefreshTokenOAuthTokenRequest"
      discriminator:
        propertyName: grant_type
        mapping:
          authorization_code: "#/components/schemas/CreateAuthorizationCodeOAuthTokenRequest"
          refresh_token: "#/components/schemas/CreateRefreshTokenOAuthTokenRequest"

    CreateAuthorizationCodeOAuthTokenRequest:
      type: object
      description: Request to exchange an authorization code for Account-issued app-scoped OAuth tokens.
      required:
        - grant_type
        - code
        - redirect_uri
        - code_verifier
      properties:
        grant_type:
          description: OAuth grant type.
          type: string
          enum:
            - authorization_code
        code:
          description: Authorization code.
          type: string
          minLength: 1
        redirect_uri:
          description: Redirect URI used in the authorization request.
          type: string
          format: uri
        code_verifier:
          $ref: "#/components/schemas/OAuthPKCECodeVerifier"
        client_id:
          description: |
            OAuth client ID of the app.

            **Required when the client does not authenticate with the OAuth client authentication method
            `client_secret_basic`.**
          allOf:
            - $ref: "#/components/schemas/OAuthClientID"

    CreateRefreshTokenOAuthTokenRequest:
      type: object
      description: Request to refresh Account-issued app-scoped OAuth tokens.
      required:
        - grant_type
        - refresh_token
      properties:
        grant_type:
          description: OAuth grant type.
          type: string
          enum:
            - refresh_token
        refresh_token:
          description: Refresh token issued by XBuilder Account.
          type: string
          minLength: 1
        scope:
          description: OAuth scope requested for the refreshed access token.
          allOf:
            - $ref: "#/components/schemas/OAuthScope"
        client_id:
          description: |
            OAuth client ID of the app.

            **Required when the client does not authenticate with the OAuth client authentication method
            `client_secret_basic`.**
          allOf:
            - $ref: "#/components/schemas/OAuthClientID"

    OAuthToken:
      type: object
      description: OAuth token response.
      required:
        - access_token
        - token_type
        - expires_in
        - scope
      properties:
        access_token:
          description: Account-issued app-scoped OAuth access token.
          type: string
          minLength: 1
        token_type:
          description: OAuth token type.
          type: string
          enum:
            - Bearer
        expires_in:
          description: Lifetime of the access token in seconds.
          type: integer
          format: int64
          minimum: 1
          examples:
            - 300
        refresh_token:
          description: Refresh token issued by XBuilder Account.
          type: string
          minLength: 1
        scope:
          description: Granted OAuth scope.
          allOf:
            - $ref: "#/components/schemas/OAuthScope"

    OAuthIntrospection:
      type: object
      description: OAuth token introspection response.
      required:
        - active
      properties:
        active:
          description: Whether the token is active.
          type: boolean
          examples:
            - true
        sub:
          description: Stable XBuilder user ID used as the OAuth subject.
          $ref: "#/components/schemas/Model/properties/id"
        client_id:
          description: OAuth client ID of the app the token was issued to.
          $ref: "#/components/schemas/OAuthClientID"
        scope:
          description: OAuth scope associated with the token.
          allOf:
            - $ref: "#/components/schemas/OAuthScope"
        exp:
          description: Expiration time as a Unix timestamp.
          type: integer
          format: int64
          minimum: 0
        iat:
          description: Issued-at time as a Unix timestamp.
          type: integer
          format: int64
          minimum: 0

    RevokeOAuthTokenRequest:
      description: Request to revoke an Account-issued OAuth token.
      oneOf:
        - $ref: "#/components/schemas/RevokeOAuthTokenWithClientAuthRequest"
        - $ref: "#/components/schemas/RevokeOAuthTokenWithClientIDRequest"

    RevokeOAuthTokenWithClientAuthRequest:
      type: object
      description: Token revocation request authenticated with OAuth client authentication.
      required:
        - token
      not:
        required:
          - client_id
      properties:
        token:
          description: OAuth token to revoke.
          type: string
          minLength: 1
        token_type_hint:
          description: |
            Hint about the type of token submitted for revocation.

            Known values include `access_token` and `refresh_token`.
          type: string
          minLength: 1
          examples:
            - access_token

    RevokeOAuthTokenWithClientIDRequest:
      type: object
      description: Token revocation request from a public client.
      required:
        - token
        - client_id
      properties:
        token:
          description: OAuth token to revoke.
          type: string
          minLength: 1
        token_type_hint:
          description: |
            Hint about the type of token submitted for revocation.

            Known values include `access_token` and `refresh_token`.
          type: string
          minLength: 1
          examples:
            - access_token
        client_id:
          description: OAuth client ID of the app.
          $ref: "#/components/schemas/OAuthClientID"

    OAuthError:
      type: object
      description: OAuth error response body.
      required:
        - error
      properties:
        error:
          description: OAuth error code.
          type: string
          minLength: 1
        error_description:
          description: Human-readable ASCII description of the error.
          type: string
          minLength: 1
        error_uri:
          description: URI identifying a human-readable web page with information about the error.
          type: string
          format: uri-reference

    AuditLog:
      type: object
      description: Admin audit log entry.
      required:
        - id
        - createdAt
        - action
        - resourceType
        - resourceID
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        action:
          description: Audit action name.
          type: string
          minLength: 1
          examples:
            - account.user.password.set
        actor:
          description: Username of the user who performed the action at the time of the audit event.
          oneOf:
            - $ref: "#/components/schemas/User/properties/username"
            - type: "null"
        resourceType:
          description: Type of the audited resource.
          type: string
          minLength: 1
          examples:
            - account.user
        resourceID:
          description: ID of the audited resource.
          $ref: "#/components/schemas/Model/properties/id"
        metadata:
          description: |
            Additional audit metadata.

            Metadata must not contain passwords, tokens, client secrets, or other secrets.
          type: object
          additionalProperties: true

    UserAuthorization:
      type: object
      description: XBuilder Authorization inputs and derived capabilities for a user.
      required:
        - userID
        - roles
        - plan
        - capabilities
      properties:
        userID:
          description: ID of the user.
          $ref: "#/components/schemas/Model/properties/id"
        roles:
          description: Roles assigned to the user.
          type: array
          items:
            type: string
            minLength: 1
          examples:
            - - assetAdmin
              - courseAdmin
        plan:
          $ref: "#/components/schemas/User/properties/plan"
        capabilities:
          $ref: "#/components/schemas/UserCapabilities"
        quotaPolicies:
          description: Derived quota policies for XBuilder Authorization decisions.
          type: object
          additionalProperties: true

    Project:
      type: object
      description: Project information including files, metadata, and statistics.
      required:
        - id
        - createdAt
        - updatedAt
        - owner
        - name
        - type
        - displayName
        - version
        - files
        - visibility
        - description
        - instructions
        - extraSettings
        - thumbnail
        - viewCount
        - likeCount
        - releaseCount
        - remixCount
      properties:
        id:
          $ref: "#/components/schemas/Model/properties/id"
        createdAt:
          $ref: "#/components/schemas/Model/properties/createdAt"
        updatedAt:
          $ref: "#/components/schemas/Model/properties/updatedAt"
        owner:
          $ref: "#/components/schemas/User/properties/username"
        remixedFrom:
          description: Full name of the project release from which the project is remixed.
          $ref: "#/components/schemas/ProjectReleaseFullName"
        latestRelease:
          description: Latest release of the project.
          $ref: "#/components/schemas/ProjectRelease"
        name:
          description: Unique name of the project.
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[A-Za-z0-9_-]{1,100}$"
          examples:
            - NiuXiaoQi
        type:
          description: Type of the project.
          type: string
          enum:
            - game
          examples:
            - game
        displayName:
          description: Display name of the project.
          type: string
          minLength: 1
          maxLength: 100
          examples:
            - Niu Xiao Qi
        version:
          description: Version number of the project.
          type: integer
          format: int32
          examples:
            - 1
        files:
          description: File paths and their corresponding universal URLs associated with the project.
          type: object
          additionalProperties:
            type: string
          examples:
            - NiuXiaoQi.spx: data:;,
              assets/backdrop.jpeg: kodo://xbuilder-usercontent-test/files/FnPtX9heX2eXE8vRIiITmFXQVAOz-5352
              assets/index.json: data:application/json,%7B%22backdrops%22%3A%5B%7B%22x%22%3A0%2C%22y%22%3A0%2C%22faceRight%22%3A0%2C%22bitmapResolution%22%3A2%2C%22name%22%3A%22backdrop%22%2C%22path%22%3A%22backdrop.png%22%2C%22builder_id%22%3A%22LGH5r3l8lDocud3zzlq3D%22%7D%5D%2C%22backdropIndex%22%3A0%2C%22map%22%3A%7B%22width%22%3A480%2C%22height%22%3A360%2C%22mode%22%3A%22fillRatio%22%7D%2C%22run%22%3A%7B%22width%22%3A480%2C%22height%22%3A360%7D%2C%22zorder%22%3A%5B%22NiuXiaoQi%22%5D%2C%22builder_spriteOrder%22%3A%5B%22fZFB5R_Mwwq95FB6xIVYu%22%5D%2C%22builder_soundOrder%22%3A%5B%5D%7D
              assets/sprites/NiuXiaoQi/costume.png: kodo://xbuilder-usercontent-test/files/FoSC8ngQn_jzAIPBqCp9VZLBVkSq-52661
              assets/sprites/NiuXiaoQi/index.json: data:application/json,%7B%22heading%22%3A90%2C%22x%22%3A0%2C%22y%22%3A0%2C%22size%22%3A1%2C%22rotationStyle%22%3A%22normal%22%2C%22costumeIndex%22%3A0%2C%22visible%22%3Atrue%2C%22isDraggable%22%3Afalse%2C%22pivot%22%3A%7B%22x%22%3A71%2C%22y%22%3A-75%7D%2C%22costumes%22%3A%5B%7B%22x%22%3A0%2C%22y%22%3A0%2C%22faceRight%22%3A0%2C%22bitmapResolution%22%3A2%2C%22name%22%3A%22costume%22%2C%22path%22%3A%22costume.png%22%2C%22builder_id%22%3A%22VCxSMAnlb3WI1IyikqjCV%22%7D%5D%2C%22fAnimations%22%3A%7B%7D%2C%22animBindings%22%3A%7B%7D%2C%22builder_id%22%3A%22fZFB5R_Mwwq95FB6xIVYu%22%7D
              main.spx: data:;,
        visibility:
          $ref: "#/components/schemas/Visibility"
        description:
          description: Brief description of the project.
          type: string
          examples:
