openapi: 3.1.0
info:
  title: XBuilder API
  version: 0.1.0
  description: |
    ## Overview

    **The API endpoints documented here are not yet stable and may change or break without notice. Use them at your own
    risk.**

security:
  - bearerAuth: []

paths:
  /account/identity-providers:
    get:
      operationId: listAccountIdentityProviders
      tags:
        - Account
      summary: List identity providers
      description: |
        Retrieve identity providers available for hosted sign-in.

        Account Web calls this endpoint with `clientID` and `requestURI` read from the hosted sign-in URL query.
      security: []
      parameters:
        - name: clientID
          description: OAuth client ID of the app requesting hosted sign-in.
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/OAuthClientID"
        - name: requestURI
          description: Pushed authorization request URI returned by `/account/oauth/par`.
          in: query
          required: true
          schema:
            type: string
            format: uri
            minLength: 1
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountIdentityProvider"

  /account/identity-providers/{provider}/authorize:
    get:
      operationId: authorizeAccountIdentityProvider
      tags:
        - Account
      summary: Start identity provider authorization
      description: |
        Redirect the user to the provider authorization endpoint for the current hosted sign-in flow.

        Account Web calls this endpoint with `clientID` and `requestURI` read from the hosted sign-in URL query.
      security: []
      parameters:
        - name: provider
          description: Identity provider name.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountIdentityProvider/properties/name"
        - name: clientID
          description: OAuth client ID of the app requesting hosted sign-in.
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/OAuthClientID"
        - name: requestURI
          description: Pushed authorization request URI returned by `/account/oauth/par`.
          in: query
          required: true
          schema:
            type: string
            format: uri
            minLength: 1
      responses:
        "302":
          description: Redirect to the identity provider authorization endpoint.
          headers:
            Location:
              description: Provider authorization URL.
              schema:
                type: string
                format: uri
                minLength: 1
        "400":
          description: Invalid hosted sign-in request.

  /account/identity-providers/{provider}/callback:
    get:
      operationId: handleAccountIdentityProviderCallback
      tags:
        - Account
      summary: Handle identity provider callback
      description: |
        Handle the identity provider callback for hosted sign-in. Callback state is used to associate the provider
        response with the hosted sign-in flow and provide CSRF protection. The provider callback includes either an
        authorization code or an OAuth error.
      security: []
      parameters:
        - name: provider
          description: Identity provider name.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountIdentityProvider/properties/name"
        - name: code
          description: Provider authorization code.
          in: query
          schema:
            type: string
            minLength: 1
        - name: state
          description: Provider callback state.
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: error
          description: Provider error code.
          in: query
          schema:
            type: string
            minLength: 1
      responses:
        "302":
          description: Redirect back to hosted sign-in.
          headers:
            Location:
              description: Hosted sign-in URL containing the original `clientID`, `requestURI`, and optional `uiLocales`.
              schema:
                type: string
                format: uri
                minLength: 1
            Set-Cookie:
              description: |
                Sets the `__Host-xbuilder-account-session` cookie when the provider callback creates an account session.
              schema:
                type: string
    post:
      operationId: submitAccountIdentityProviderCallback
      tags:
        - Account
      summary: Submit identity provider callback
      description: |
        Handle identity provider callbacks that use form post response mode. These external callbacks use the OAuth
        state parameter for CSRF protection instead of a same-site web CSRF token. The provider callback includes either
        an authorization code or an OAuth error.
      security: []
      parameters:
        - name: provider
          description: Identity provider name.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountIdentityProvider/properties/name"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - title: Authorization code callback
                  type: object
                  required:
                    - code
                    - state
                  properties:
                    code:
                      description: Provider authorization code.
                      type: string
                      minLength: 1
                    state:
                      description: Provider callback state.
                      type: string
                      minLength: 1
                - title: OAuth error callback
                  type: object
                  required:
                    - state
                    - error
                  properties:
                    state:
                      description: Provider callback state.
                      type: string
                      minLength: 1
                    error:
                      description: Provider error code.
                      type: string
                      minLength: 1
      responses:
        "302":
          description: Redirect back to hosted sign-in.
          headers:
            Location:
              description: Hosted sign-in URL containing the original `clientID`, `requestURI`, and optional `uiLocales`.
              schema:
                type: string
                format: uri
                minLength: 1
            Set-Cookie:
              description: |
                Sets the `__Host-xbuilder-account-session` cookie when the provider callback creates an account session.
              schema:
                type: string

  /account/oauth/par:
    post:
      operationId: createAccountOAuthPushedAuthorizationRequest
      tags:
        - Account OAuth
      summary: Create a pushed authorization request
      description: |
        Create a pushed authorization request for an app using OAuth 2.0 PAR.

        The requested redirect URI must exactly match the app allowlist.

        Provider credential handoff codes, when supplied, must be valid, unexpired, unused, and match the requested
        provider. Invalid provider codes must not produce usable `request_uri` values.

        The returned `request_uri` is an opaque, short-lived, single-use reference and is not a dereferenceable URL.
      security:
        - oauthClientSecretBasic: []
        - {}
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              allOf:
                - if:
                    required:
                      - xbuilder_provider_code
                  then:
                    required:
                      - xbuilder_provider
                - if:
                    required:
                      - xbuilder_provider
                  then:
                    required:
                      - xbuilder_provider_code
              required:
                - response_type
                - client_id
                - redirect_uri
                - state
                - code_challenge
                - code_challenge_method
                - scope
              properties:
                response_type:
                  description: OAuth response type.
                  type: string
                  enum:
                    - code
                client_id:
                  description: OAuth client ID of the app.
                  $ref: "#/components/schemas/OAuthClientID"
                redirect_uri:
                  description: Redirect URI requested by the app.
                  type: string
                  format: uri
                state:
                  description: OAuth state value.
                  type: string
                  minLength: 1
                code_challenge:
                  $ref: "#/components/schemas/OAuthPKCECodeChallenge"
                code_challenge_method:
                  description: PKCE code challenge method.
                  type: string
                  enum:
                    - S256
                scope:
                  description: OAuth scope requested by the app.
                  allOf:
                    - $ref: "#/components/schemas/OAuthScope"
                ui_locales:
                  description: |
                    Preferred UI locales for hosted sign-in, using space-separated BCP 47 language tags.

                    The server uses a supported locale from this list when possible and may fall back to a default
                    locale.
                  type: string
                  minLength: 1
                  maxLength: 256
                  pattern: "^[A-Za-z]{2,8}(?:-[A-Za-z0-9]{1,8})*(?: [A-Za-z]{2,8}(?:-[A-Za-z0-9]{1,8})*)*$"
                  examples:
                    - zh-CN zh en
                xbuilder_provider:
                  description: Identity provider used for provider credential handoff.
                  $ref: "#/components/schemas/AccountIdentityProvider/properties/name"
                xbuilder_provider_code:
                  description: Short-lived provider code obtained by the app frontend.
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Pushed authorization request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthPushedAuthorizationResponse"
        "400":
          $ref: "#/components/responses/OAuthError"
        "401":
          $ref: "#/components/responses/OAuthInvalidClient"
        "415":
          $ref: "#/components/responses/OAuthUnsupportedMediaType"

  /account/oauth/authorize:
    get:
      operationId: authorizeAccountOAuthApp
      tags:
        - Account OAuth
      summary: Handle an OAuth authorization request
      description: |
        Start or complete the OAuth authorization code flow for a registered app.

        This endpoint accepts PAR authorization requests only. The app must push authorization request parameters to
        `/account/oauth/par` first and then call this endpoint with `client_id` and `request_uri`.

        The `request_uri` value must reference a valid pushed authorization request bound to the `client_id`.

        The account can be resolved from an account session or from provider credential handoff stored in the pushed
        authorization request.

        If the account cannot be resolved or hosted interaction is required, this endpoint redirects to hosted sign-in.
        The hosted sign-in URL carries `clientID`, `requestURI`, and optional `uiLocales` query parameters for Account
        Web.

        After the account is resolved and the OAuth authorization request can be completed, the authorization response
        redirects to the app callback with an authorization code and the original `state`, or with OAuth error
        parameters and the original `state`.
      security: []
      parameters:
        - name: client_id
          description: OAuth client ID of the app.
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/OAuthClientID"
        - name: request_uri
          description: Opaque pushed authorization request URI returned by `/account/oauth/par`.
          in: query
          required: true
          schema:
            type: string
            format: uri
            minLength: 1
            examples:
              - urn:ietf:params:oauth:request_uri:6esc_11ACC5bwc014ltc14eY22c
      responses:
        "302":
          description: |
            Redirect to hosted sign-in, or to the app callback with an authorization code or OAuth error parameters.
          headers:
            Location:
              description: |
                Hosted sign-in URL or app callback URL.

                Hosted sign-in URLs contain `clientID`, `requestURI`, and optional `uiLocales`.

                App callback URLs contain `code` and `state`, or OAuth error parameters and `state`.
              schema:
                type: string
                format: uri
                minLength: 1
        "400":
          $ref: "#/components/responses/OAuthError"

  /account/oauth/token:
    post:
      operationId: createAccountOAuthToken
      tags:
        - Account OAuth
      summary: Create an OAuth token
      description: |
        Create or refresh Account-issued app-scoped OAuth tokens.

        Authorization code exchange validates the redirect URI and PKCE verifier.

        Refresh token exchange rotates the refresh token. Reuse of a rotated refresh token is treated as a replay signal
        and revokes the corresponding token family or grant.
      security:
        - oauthClientSecretBasic: []
        - {}
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CreateOAuthTokenRequest"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthToken"
        "400":
          $ref: "#/components/responses/OAuthError"
        "401":
          $ref: "#/components/responses/OAuthInvalidClient"
        "415":
          $ref: "#/components/responses/OAuthUnsupportedMediaType"

  /account/oauth/introspect:
    post:
      operationId: introspectAccountOAuthToken
      tags:
        - Account OAuth
      summary: Introspect an OAuth token
      description: Introspect an Account-issued OAuth token using OAuth 2.0 Token Introspection.
      security:
        - oauthClientSecretBasic: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  description: OAuth token to introspect.
                  type: string
                  minLength: 1
                token_type_hint:
                  description: |
                    Hint about the type of token submitted for introspection.

                    Known values include `access_token` and `refresh_token`.
                  type: string
                  minLength: 1
                  examples:
                    - access_token
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthIntrospection"
        "400":
          $ref: "#/components/responses/OAuthError"
        "401":
          $ref: "#/components/responses/OAuthInvalidClient"
        "415":
          $ref: "#/components/responses/OAuthUnsupportedMediaType"

  /account/oauth/revoke:
    post:
      operationId: revokeAccountOAuthToken
      tags:
        - Account OAuth
      summary: Revoke an OAuth token
      description: |
        Revoke an Account-issued OAuth token using OAuth 2.0 Token Revocation.

        Confidential clients authenticate with `client_secret_basic` and must not send `client_id` in the request body.
        Public clients must send `client_id`.
      security:
        - oauthClientSecretBasic: []
        - {}
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/RevokeOAuthTokenRequest"
      responses:
        "200":
          description: OAuth token revoked.
        "400":
          $ref: "#/components/responses/OAuthError"
        "401":
          $ref: "#/components/responses/OAuthInvalidClient"
        "415":
          $ref: "#/components/responses/OAuthUnsupportedMediaType"

  /account/user:
    get:
      operationId: getAccountUser
      tags:
        - Account
      summary: Get the current account user
      description: |
        Retrieve user fields exposed by XBuilder Account for the current user.

        Account Web may authenticate with an account session cookie.

        App backends may authenticate with an Account-issued app-scoped OAuth access token with the `account:user:read`
        Account API scope.
      security:
        - accountSessionCookie: []
        - bearerAuth: []
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUser"
        "401":
          $ref: "#/components/responses/AccountUnauthorized"
        "403":
          $ref: "#/components/responses/OAuthInsufficientScope"
    patch:
      operationId: updateAccountUser
      tags:
        - Account
      summary: Update the current account user
      description: |
        Update writable user fields managed by XBuilder Account for the current user.

        Account Web may authenticate with an account session cookie.

        App backends may authenticate with an Account-issued app-scoped OAuth access token with the `account:user:write`
        Account API scope.

        Cookie-authenticated mutations must validate Origin or use equivalent CSRF protection.
      security:
        - accountSessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                displayName:
                  $ref: "#/components/schemas/AccountUser/properties/displayName"
      responses:
        "200":
          description: Account user updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUser"
        "401":
          $ref: "#/components/responses/AccountUnauthorized"
        "403":
          $ref: "#/components/responses/OAuthInsufficientScope"

  /account/user/avatar:
    put:
      operationId: updateAccountUserAvatar
      tags:
        - Account
      summary: Update the current account user avatar
      description: |
        Upload and replace the avatar image managed by XBuilder Account for the current user.

        Account Web may authenticate with an account session cookie.

        App backends may authenticate with an Account-issued app-scoped OAuth access token with the `account:user:write`
        Account API scope.

        Cookie-authenticated mutations must validate Origin or use equivalent CSRF protection.
      security:
        - accountSessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  description: Avatar image file.
                  type: string
                  format: binary
                  maxLength: 5242880
            encoding:
              file:
                contentType: image/png, image/jpeg
      responses:
        "204":
          description: Account user avatar updated.
        "400":
          description: Invalid request parameters.
        "401":
          $ref: "#/components/responses/AccountUnauthorized"
        "403":
          $ref: "#/components/responses/OAuthInsufficientScope"
        "413":
          description: Avatar image file is too large.
        "415":
          description: Avatar image file type is not supported.

  /account/user/identities:
    get:
      operationId: listAccountUserIdentities
      tags:
        - Account
      summary: List current account user identities
      description: Retrieve a list of third-party identities linked to the current user.
      security:
        - accountSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PageIndex"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    $ref: "#/components/schemas/ByPage/properties/total"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountUserIdentity"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/session:
    post:
      operationId: createAccountSession
      tags:
        - Account
      summary: Create an account session
      description: Create an account session for hosted sign-in.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountSessionRequest"
            examples:
              password:
                summary: Password sign-in
                value:
                  username: john
                  password: <your-password>
      responses:
        "201":
          description: Account session created.
          headers:
            Set-Cookie:
              description: |
                Sets the `__Host-xbuilder-account-session` cookie with `HttpOnly`, `Secure`, `SameSite=Lax`, `Path=/`,
                and no `Domain`.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentAccountSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      operationId: getAccountSession
      tags:
        - Account
      summary: Get the current account session
      description: Retrieve the current account session.
      security:
        - accountSessionCookie: []
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentAccountSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteAccountSession
      tags:
        - Account
      summary: Delete the current account session
      description: |
        Revoke the current account session.

        Cookie-authenticated mutations must validate Origin or use equivalent CSRF protection.
      security:
        - accountSessionCookie: []
      responses:
        "204":
          description: Account session deleted.
          headers:
            Set-Cookie:
              description: Clears the `__Host-xbuilder-account-session` cookie.
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/sessions:
    get:
      operationId: listAccountSessions
      tags:
        - Account
      summary: List current account sessions
      description: Retrieve a list of account sessions of the current user.
      security:
        - accountSessionCookie: []
      parameters:
        - $ref: "#/components/parameters/PageIndex"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    $ref: "#/components/schemas/ByPage/properties/total"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteAccountSessions
      tags:
        - Account
      summary: Delete current account sessions
      description: |
        Revoke all account sessions of the current user.

        Cookie-authenticated mutations must validate Origin or use equivalent CSRF protection.
      security:
        - accountSessionCookie: []
      responses:
        "204":
          description: Account sessions deleted.
          headers:
            Set-Cookie:
              description: Clears the `__Host-xbuilder-account-session` cookie.
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/sessions/{sessionID}:
    delete:
      operationId: deleteAccountSessionByID
      tags:
        - Account
      summary: Delete an account session of the current user
      description: |
        Revoke an account session owned by the current user.

        Cookie-authenticated mutations must validate Origin or use equivalent CSRF protection.
      security:
        - accountSessionCookie: []
      parameters:
        - name: sessionID
          description: ID of the account session to delete.
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Model/properties/id"
      responses:
        "204":
          description: Account session deleted.
          headers:
            Set-Cookie:
              description: Clears the `__Host-xbuilder-account-session` cookie when the deleted session is current.
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Account session not found.

  /user:
    get:
      operationId: getAuthenticatedUser
      tags:
        - Users
      summary: Get the authenticated user
      description: Retrieve the profile information of the authenticated user.
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateAuthenticatedUser
      tags:
        - Users
      summary: Update the authenticated user
      description: Update the profile information of the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                username:
                  description: New username of the authenticated user. If provided, the username will be modified.
                  $ref: "#/components/schemas/User/properties/username"
                displayName:
                  $ref: "#/components/schemas/User/properties/displayName"
                avatar:
                  description: New avatar Kodo universal URL of the authenticated user.
                  allOf:
                    - $ref: "#/components/schemas/User/properties/avatar"
                    - minLength: 1
                      pattern: "^kodo://[^/?#@:]+/[^?#]+$"
                      examples:
                        - kodo://xbuilder-usercontent-test/files/FvYyHLNrtx8qFHSwnLjEe57UA2fF-2824936
                description:
                  $ref: "#/components/schemas/User/properties/description"
      responses:
        "200":
          description: Successfully updated the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /user/followers:
    get:
      operationId: listAuthenticatedUserFollowers
      tags:
        - Users
      summary: List followers of the authenticated user
      description: Retrieve users who follow the authenticated user.
      parameters:
        - name: orderBy
          description: Field by which to order the results.
          in: query
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
              - followedAt
            default: followedAt
            examples:
              - followedAt
        - $ref: "#/components/parameters/SortOrder"
        - $ref: "#/components/parameters/PageIndex"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    $ref: "#/components/schemas/ByPage/properties/total"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /user/following:
    get:
      operationId: listAuthenticatedUserFollowing
      tags:
        - Users
      summary: List users followed by the authenticated user
      description: Retrieve users followed by the authenticated user.
      parameters:
        - name: orderBy
          description: Field by which to order the results.
          in: query
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
              - followedAt
            default: followedAt
            examples:
              - followedAt
        - $ref: "#/components/parameters/SortOrder"
        - $ref: "#/components/parameters/PageIndex"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Successful response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    $ref: "#/components/schemas/ByPage/properties/total"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /user/following/{username}:
    get:
      operationId: checkAuthenticatedUserFollowing
      tags:
        - Users
      summary: Check whether the authenticated user follows a user
