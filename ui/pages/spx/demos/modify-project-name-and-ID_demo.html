<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Name ID - Merged Nav States</title>
  <style>
    :root {
      --white: #ffffff;
      --title: #24292f;
      --hint: #a7b1bb;
      --primary: #0bc0cf;
      --hover-bg: #3fcdd9;
      --page-bg: #e9fcff;
      --line: #d9dfe5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Alibaba Health Font 2.0 CN", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--page-bg);
      color: var(--white);
      min-height: 100vh;
    }

    .top-nav {
      width: 100%;
      min-height: 50px;
      background: url("../../../images/navbar bg.png") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 8px;
      user-select: none;
      position: relative;
      z-index: 20;
    }

    .nav-left,
    .nav-center,
    .nav-right {
      display: flex;
      align-items: center;
      min-height: 50px;
    }

    .nav-left,
    .nav-right { flex: 1; }

    .nav-right { justify-content: flex-end; padding-right: 8px; }
    .nav-left { gap: 0; }

    .nav-logo-wordmark {
      width: 150px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      flex: 0 0 auto;
    }

    .nav-logo-wordmark svg { width: 102px; height: 30px; display: block; }

    .divider {
      width: 1px;
      height: 24px;
      background: #ffffff4d;
      flex: 0 0 auto;
    }

    .nav-btn {
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 0 20px;
      cursor: pointer;
      line-height: 0;
    }

    .nav-btn svg { display: block; }
    .nav-btn-file { width: 80px; padding: 0 20px; }
    .nav-btn-file.file-open { background: #0aa5be; }
    .nav-btn-redo { opacity: 0.5; }
    .icon-24 { width: 24px; height: 24px; }
    .icon-16 { width: 16px; height: 16px; }
    .left-icon-group { display: inline-flex; align-items: center; gap: 0; line-height: 0; }

    .nav-actions-group { display: inline-flex; align-items: center; }

    .nav-mode-switch {
      width: 108px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      flex: 0 0 auto;
    }

    .button-group {
      width: 100%;
      display: inline-flex;
      border-radius: 12px;
      overflow: hidden;
    }

    .mode-btn {
      flex: 1;
      height: 32px;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fbfcfd;
      cursor: pointer;
      padding: 0;
    }

    .mode-btn.active { background: #47d8e4; }
    .mode-btn svg { width: 18px; height: 18px; display: block; }

    .nav-button-user {
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .user-avatar::before {
      content: "";
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.333px solid #fff;
      background:  url("../../../images/用户头像.png") center/cover no-repeat;
      display: block;
    }

    .project-wrap {
      width: 370px;
      min-width: 320px;
      max-width: min(370px, 45vw);
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      position: relative;
    }

    .project-pill {
      height: 34px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 3px 12px;
      transition: all 120ms ease;
      border: 1px solid transparent;
      cursor: default;
    }

    .name-text {
      font-size: 16px;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .name-input {
      font-size: 16px;
      width: 220px;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--title);
      font-family: inherit;
      padding: 0;
      margin: 0;
    }

    .caret {
      width: 1px;
      height: 24px;
      background: var(--primary);
      animation: blink 1s step-end infinite;
      display: none;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .icon-btn {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: var(--white);
      line-height: 0;
    }

    .icon-edit { width: 16px; height: 16px; display: block; }
    .icon-save { width: 24px; height: 24px; display: block; }

    .project-list {
      position: fixed;
      width: 301px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 21px #24292f14;
      padding: 8px;
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 60;
    }

    .project-list.open { display: flex; }

    .list-group {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .list-group + .list-group {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #eaeff3;
    }

    .list-item {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px;
      border: 0;
      background: transparent;
      color: #24292f;
      text-align: left;
      font-size: 14px;
      font-family: "Alibaba Health Font 2.0 CN", "Inter", sans-serif;
      border-radius: 8px;
      cursor: pointer;
      position: relative;
    }

    .list-item:hover { background: #f6f8fa; }
    .list-item:active,
    .list-item:focus-visible { background: #f6f8fa; }
    .list-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #51dadc;
      flex: 0 0 auto;
      position: relative;
    }
    .list-icon::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      right: 4px;
      bottom: 4px;
      background: #0aa5be;
    }

    .list-id-meta {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      color: #a7b1bb;
      font-size: 14px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(36, 41, 47, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 80;
      padding: 24px;
    }

    .overlay.show { display: flex; }

    .modal {
      width: 560px;
      max-width: calc(100vw - 48px);
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 21px #24292f14;
      display: none;
      flex-direction: column;
    }

    .modal.show { display: flex; }

    .modal-header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid #eaeff3;
      color: #24292f;
      font-size: 16px;
    }

    .modal-close {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 0;
      background: transparent;
      color: #a7b1bb;
      font-size: 18px;
      cursor: pointer;
    }

    .modal-content {
      padding: 20px 24px 32px;
      border-bottom: 1px solid #eaeff3;
      color: #6e7781;
      font-size: 14px;
      line-height: 1.6;
    }

    .warn-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .warn-tip {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #faa135;
    }

    .warn-tip-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #faa135;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      line-height: 1;
      font-size: 14px;
      flex: 0 0 auto;
    }

    .warn-lines {
      margin: 0;
      padding-left: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
      color: #6e7781;
    }

    .modal-footer {
      display: flex;
      gap: 16px;
      padding: 0 24px 28px;
    }

    .modal-footer.center { justify-content: center; }
    .modal-footer.end { justify-content: flex-end; }

    .modal-btn {
      border: 0;
      border-radius: 12px;
      padding: 7px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .modal-btn-danger {
      background: #ef4149;
      color: #fff;
      box-shadow: 0 4px 0 #bc292e;
    }

    .modal-btn-cancel {
      background: #f6f8fa;
      color: #57606a;
      box-shadow: 0 4px 0 #cbd2d8;
    }

    .modal-btn-confirm {
      background: #0bc0cf;
      color: #fff;
      box-shadow: 0 4px 0 #0b8893;
    }

    .id-input-wrap { display: flex; flex-direction: column; gap: 4px; }
    .id-input {
      width: 100%;
      height: 32px;
      border: 0;
      border-radius: 12px;
      background: #f6f8fa;
      padding: 5px 12px;
      font-size: 14px;
      color: #24292f;
      outline: none;
    }
    .id-input-hint { color: #6e7781; font-size: 14px; }
    .id-input-error { color: #ef4149; display: none; font-size: 12px; }
    .id-input.invalid + .id-input-error { display: block; }

    .project-wrap[data-state="default"] .project-pill {
      background: transparent;
    }

    .project-wrap[data-state="default"] .name-text {
      color: var(--white);
      font-weight: 600;
    }

    .project-wrap[data-state="default"] .edit-icon,
    .project-wrap[data-state="default"] .caret,
    .project-wrap[data-state="default"] .name-input {
      display: none;
    }

    .project-wrap[data-state="default"] .save-icon { display: inline-flex; }

    .project-wrap[data-state="hover"] .project-pill {
      background: var(--hover-bg);
      cursor: pointer;
    }

    .project-wrap[data-state="hover"] .name-text {
      color: var(--white);
      font-weight: 400;
    }

    .project-wrap[data-state="hover"] .edit-icon,
    .project-wrap[data-state="hover"] .save-icon {
      display: inline-flex;
    }

    .project-wrap[data-state="hover"] .caret,
    .project-wrap[data-state="hover"] .name-input {
      display: none;
    }

    .project-wrap[data-state="active"] .project-pill,
    .project-wrap[data-state="inputing"] .project-pill {
      background: var(--white);
      cursor: text;
      border-color: rgba(0, 0, 0, 0.02);
    }

    .project-wrap[data-state="active"] .name-text,
    .project-wrap[data-state="inputing"] .name-text {
      display: none;
    }

    .project-wrap[data-state="active"] .name-input,
    .project-wrap[data-state="inputing"] .name-input {
      display: inline-block;
    }

    .project-wrap[data-state="active"] .name-input { color: var(--hint); }
    .project-wrap[data-state="inputing"] .name-input { color: var(--title); }

    .project-wrap[data-state="active"] .edit-icon,
    .project-wrap[data-state="inputing"] .edit-icon,
    .project-wrap[data-state="active"] .save-icon,
    .project-wrap[data-state="inputing"] .save-icon {
      display: inline-flex;
    }

    .project-wrap[data-state="active"] .caret,
    .project-wrap[data-state="inputing"] .caret {
      display: inline-block;
    }

    @media (max-width: 960px) {
      .divider, .nav-btn-tutorial, .nav-btn-undo, .nav-btn-redo, .nav-mode-switch { display: none; }
      .project-wrap { width: auto; max-width: 60vw; min-width: 200px; }
      .name-text, .name-input { max-width: 120px; width: 120px; }
    }
  </style>
</head>

  <script>
    (function () {
      const projectWrap = document.getElementById('projectWrap');
      const projectPill = document.getElementById('projectPill');
      const nameText = document.getElementById('nameText');
      const nameInput = document.getElementById('nameInput');
      const editIcon = document.getElementById('editIcon');
      const fileBtn = document.getElementById('fileBtn');
      const projectList = document.getElementById('projectList');
      const modifyProjectIdRow = document.getElementById('modifyProjectIdRow');
      const listProjectIdValue = document.getElementById('listProjectIdValue');
      const overlay = document.getElementById('modalOverlay');
      const warnModal = document.getElementById('warnModal');
      const warnConfirmBtn = document.getElementById('warnConfirmBtn');
      const warnCloseBtn = document.getElementById('warnCloseBtn');
      const modifyIdModal = document.getElementById('modifyIdModal');
      const modifyCloseBtn = document.getElementById('modifyCloseBtn');
      const modifyCancelBtn = document.getElementById('modifyCancelBtn');
      const modifyConfirmBtn = document.getElementById('modifyConfirmBtn');
      const projectIdInput = document.getElementById('projectIdInput');

      let state = 'default';
      let currentName = nameText.textContent;
      let projectId = '123125';

      function setState(next) {
        state = next;
        projectWrap.dataset.state = next;
      }

      function enterEdit() {
        setState('active');
        nameInput.value = currentName;
        requestAnimationFrame(() => {
          nameInput.focus();
          nameInput.select();
        });
      }

      function finishEdit() {
        const nextName = nameInput.value.trim();
        if (nextName) {
          currentName = nextName;
          nameText.textContent = nextName;
        } else {
          nameInput.value = currentName;
        }
        setState('default');
      }

      function closeProjectList() {
        projectList.classList.remove('open');
        fileBtn.classList.remove('file-open');
      }

      function positionProjectList() {
        const r = fileBtn.getBoundingClientRect();
        projectList.style.left = `${r.left}px`;
        projectList.style.top = `${r.bottom + 6}px`;
      }

      function openProjectList() {
        setState('default');
        positionProjectList();
        projectList.classList.add('open');
        fileBtn.classList.add('file-open');
      }

      function closeAllModalsToDefault() {
        overlay.classList.remove('show');
        warnModal.classList.remove('show');
        modifyIdModal.classList.remove('show');
        closeProjectList();
        setState('default');
      }

      function openWarnModal() {
        overlay.classList.add('show');
        warnModal.classList.add('show');
        modifyIdModal.classList.remove('show');
      }

      function openModifyModal() {
        warnModal.classList.remove('show');
        modifyIdModal.classList.add('show');
        projectIdInput.value = projectId;
        projectIdInput.classList.remove('invalid');
        requestAnimationFrame(() => projectIdInput.focus());
      }

      projectPill.addEventListener('mouseenter', () => {
        if (state === 'default') setState('hover');
      });

      projectPill.addEventListener('mouseleave', () => {
        if (state === 'hover') setState('default');
      });

      projectPill.addEventListener('click', (event) => {
        if (state === 'hover' || state === 'default') {
          event.stopPropagation();
          enterEdit();
        }
      });

      editIcon.addEventListener('click', (event) => {
        event.stopPropagation();
        if (state !== 'active' && state !== 'inputing') enterEdit();
      });

      nameInput.addEventListener('input', () => {
        if (state === 'active' || state === 'inputing') {
          setState('inputing');
        }
      });

      nameInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          finishEdit();
        }
        if (event.key === 'Escape') {
          event.preventDefault();
          nameInput.value = currentName;
          setState('default');
        }
      });

      document.addEventListener('mousedown', (event) => {
        if ((state === 'active' || state === 'inputing') && !projectWrap.contains(event.target)) {
          finishEdit();
        }
      });

      nameInput.addEventListener('blur', () => {
        if (state === 'active' || state === 'inputing') {
          setTimeout(() => {
            if (state === 'active' || state === 'inputing') finishEdit();
          }, 0);
        }
      });

      fileBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        if (projectList.classList.contains('open')) {
          closeProjectList();
          return;
        }
        openProjectList();
      });

      modifyProjectIdRow.addEventListener('click', (event) => {
        event.stopPropagation();
        closeProjectList();
        openWarnModal();
      });

      warnConfirmBtn.addEventListener('click', () => openModifyModal());
      warnCloseBtn.addEventListener('click', () => closeAllModalsToDefault());
      modifyCloseBtn.addEventListener('click', () => closeAllModalsToDefault());
      modifyCancelBtn.addEventListener('click', () => closeAllModalsToDefault());

      modifyConfirmBtn.addEventListener('click', () => {
        const next = projectIdInput.value.trim();
        if (!/^[A-Za-z0-9]+$/.test(next)) {
          projectIdInput.classList.add('invalid');
          return;
        }
        projectId = next;
        listProjectIdValue.textContent = projectId;
        closeAllModalsToDefault();
      });

      projectIdInput.addEventListener('input', () => {
        projectIdInput.classList.remove('invalid');
      });

      projectIdInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          modifyConfirmBtn.click();
        }
        if (event.key === 'Escape') {
          event.preventDefault();
          closeAllModalsToDefault();
        }
      });

      document.addEventListener('click', (event) => {
        if (projectList.classList.contains('open') && !projectList.contains(event.target) && !fileBtn.contains(event.target)) {
          closeProjectList();
        }
      });

      window.addEventListener('resize', () => {
        if (projectList.classList.contains('open')) positionProjectList();
      });
    })();
  </script>
</body>
</html>
