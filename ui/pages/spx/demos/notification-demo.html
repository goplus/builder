<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Version Notification Demo</title>
  <style>
    :root {
      --page-bg: #f3f5f8;
      --header-text: #ffffff;
      --header-divider: #ffffff4d;
      --search-bg: rgba(255, 255, 255, 0.16);
      --banner-bg: #e7f9fa;
      --banner-text: #0bc0cf;
      --update-btn-bg: #3fcdd9;
      --close-icon: #a7b1bb;
      --content-text: #4d5b6a;
      --panel-bg: #ffffff;
      --panel-shadow: 0 8px 24px rgba(16, 32, 52, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--page-bg);
      font-family: "Alibaba Health Font 2.0 CN", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .topbar {
      width: 100%;
      height: 50px;
      background: url("../../../images/navbar-bg.png") center/cover no-repeat;
      display: flex;
      justify-content: center;
    }

    .topbar-inner {
      width: 1240px;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-left,
    .topbar-right {
      height: 50px;
      display: flex;
      align-items: center;
      flex: 1;
    }

    .topbar-right {
      justify-content: flex-end;
    }

    .logo-wrap {
      width: 150px;
      height: 50px;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      color: var(--header-text);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.2px;
      line-height: 1;
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--header-divider);
      flex: none;
    }

    .topbar-btn {
      height: 50px;
      padding: 0 20px;
      border: 0;
      background: transparent;
      color: var(--header-text);
      opacity: 0.9;
      cursor: default;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
    }

    .topbar-icon {
      display: block;
      fill: #ffffff;
      opacity: 0.95;
      flex: none;
    }

    .plus-icon {
      width: 18px;
      height: 18px;
    }

    .caret-down {
      width: 16px;
      height: 16px;
    }

    .tutorial-icon {
      width: 16px;
      height: 18px;
    }

    .search-box {
      width: 340px;
      height: 32px;
      border-radius: 12px;
      background: var(--search-bg);
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 14px;
      font-family: Inter, "Alibaba Health Font 2.0 CN", sans-serif;
    }

    .search-icon {
      width: 14px;
      height: 14px;
      flex: none;
      display: block;
      fill: rgba(255, 255, 255, 0.92);
    }

    .avatar-btn {
      height: 50px;
      padding: 0 20px;
      display: flex;
      align-items: center;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      background: radial-gradient(circle at 30% 30%, #fff8de 0%, #ffdcae 35%, #ffb26d 100%);
    }

    .notification-banner {
      width: 100%;
      height: 50px;
      background: var(--banner-bg);
      padding: 11px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: all 0.25s ease;
    }

    .notification-banner.is-hidden {
      opacity: 0;
      height: 0;
      padding-top: 0;
      padding-bottom: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .banner-main {
      flex: 1;
      min-width: 0;
      padding-left: 28px;
      gap: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .banner-message {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--banner-text);
      font-size: 14px;
      line-height: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notify-icon {
      width: 26px;
      height: 26px;
      background: url("../../../images/notification.gif") center/cover no-repeat;
      flex: none;
    }

    .update-btn {
      height: 26px;
      padding: 5px 12px;
      border: none;
      border-radius: 12px;
      background: var(--update-btn-bg);
      color: #ffffff;
      font-size: 13px;
      font-weight: 400;
      line-height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      font-family: "Alibaba Health Font 2.0 CN", "PingFang SC", "Microsoft YaHei", sans-serif;
      appearance: none;
    }

    .update-btn:hover {
      filter: brightness(0.97);
    }

    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      flex: none;
      transition: background-color 0.18s ease;
    }

    .close-btn:hover {
      background: rgba(167, 177, 187, 0.14);
    }

    .close-btn:active {
      background: rgba(167, 177, 187, 0.22);
    }

    .close-btn svg {
      width: 11.667px;
      height: 11.667px;
      fill: var(--close-icon);
      display: block;
    }

    .content {
      width: 1240px;
      padding: 20px 0 40px;
    }

    .note-panel {
      width: 100%;
      background: var(--panel-bg);
      border-radius: 14px;
      box-shadow: var(--panel-shadow);
      padding: 20px 24px;
    }

    .note-title {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.4;
      color: #1f2d3d;
      font-family: Inter, "Alibaba Health Font 2.0 CN", sans-serif;
    }

    .note-text {
      margin: 0;
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.7;
      color: var(--content-text);
    }

    @media (max-width: 1280px) {
      .topbar-inner,
      .content {
        width: calc(100% - 32px);
      }
    }

    @media (max-width: 900px) {
      .topbar-inner {
        gap: 8px;
      }

      .search-box {
        display: none;
      }

      .banner-main {
        justify-content: flex-start;
        padding-left: 0;
      }

      .banner-message {
        white-space: normal;
      }

      .topbar-btn {
        padding: 0 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar" aria-label="顶部状态栏">
      <div class="topbar-inner">
        <div class="topbar-left">
          <div class="logo-wrap">XBuilder</div>
          <div class="divider" aria-hidden="true"></div>
          <button class="topbar-btn" type="button" aria-label="create">
            <svg class="topbar-icon plus-icon" viewBox="0 0 18 18" aria-hidden="true" focusable="false">
              <path d="M9 0c0.82843 0 1.5 0.67157 1.5 1.5l0 6 6 0c0.82843 0 1.5 0.67157 1.5 1.5 0 0.82843-0.67157 1.5-1.5 1.5l-6 0 0 6c0 0.82843-0.67157 1.5-1.5 1.5-0.82843 0-1.5-0.67157-1.5-1.5l0-6-6 0c-0.82843 0-1.5-0.67157-1.5-1.5 0-0.82843 0.67157-1.5 1.5-1.5l6 0 0-6c0-0.82843 0.67157-1.5 1.5-1.5"></path>
            </svg>
            <svg class="topbar-icon caret-down" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path d="M4.69774 5.396l-4.37989-5.1941c-0.736-0.873-0.11206-2.2019 1.03394-2.2019l9.2959 0c1.146 0 1.76994 1.3299 1.03393 2.2019l-4.37988 5.1941c-0.679 0.805-1.925 0.805-2.604 0z"></path>
            </svg>
          </button>
          <button class="topbar-btn" type="button" aria-label="tutorial">
            <svg class="topbar-icon tutorial-icon" viewBox="0 0 16 18" aria-hidden="true" focusable="false">
              <path d="M15 0c0.55228 0 1 0.44772 1 1l0 16c0 0.55228-0.44772 1-1 1l-13 0c-1.10457 0-2-0.89543-2-2l0-13c0-1.65685 1.34315-3 3-3l12 0z m-12 13c-0.55228 0-1 0.44772-1 1l0 1c0 0.55228 0.44772 1 1 1l10.6 0c0.22091 0 0.4-0.17909 0.4-0.4l0-2.2c0-0.22091-0.17909-0.4-0.4-0.4l-10.6 0z m8.715-11.29c-0.05349-0.16866-0.21006-0.28325-0.387-0.28325-0.17694 0-0.3335 0.11459-0.387 0.28325l-0.446 1.378c-0.12117 0.37068-0.41094 0.66194-0.781 0.785l-1.363 0.452c-0.16825 0.0553-0.28198 0.21239-0.28198 0.3895 0 0.17711 0.11372 0.3342 0.28198 0.3895l1.363 0.452c0.368 0.122 0.66 0.413 0.781 0.785l0.446 1.377c0.05456 0.16757 0.21077 0.28098 0.387 0.28098 0.17623 0 0.33244-0.11342 0.387-0.28098l0.446-1.377c0.121-0.372 0.412-0.663 0.78-0.785l1.364-0.452c0.16825-0.0553 0.28198-0.21239 0.28198-0.3895 0-0.17711-0.11372-0.3342-0.28198-0.3895l-1.364-0.452c-0.36968-0.12333-0.65904-0.41454-0.78-0.785l-0.446-1.378z"></path>
            </svg>
          </button>
        </div>

        <div class="topbar-right">
          <div class="search-box" aria-label="Search project">
            <svg class="search-icon" viewBox="0 0 12 12" aria-hidden="true" focusable="false">
              <path d="M4.90069 9.70857c1.06426 0 2.04567-0.34087 2.84865-0.90899l3.02071 2.99211c0.1402 0.13887 0.32501 0.20831 0.52257 0.20831 0.41423 0 0.70738-0.31562 0.70738-0.71962 0-0.18937-0.06373-0.37244-0.20393-0.505l-3.00159-2.97948c0.63091-0.82062 1.0069-1.83693 1.0069-2.94161 0-2.67017-2.20499-4.85429-4.90069-4.85429-2.68933 0-4.90069 2.1778-4.90069 4.85429 0 2.67017 2.20499 4.85429 4.90069 4.85428z m0-1.04787c-2.10303 0-3.8428-1.7233-3.8428-3.80641 0-2.08311 1.73978-3.80642 3.8428-3.80642 2.10303 0 3.8428 1.7233 3.8428 3.80642 0 2.08311-1.73978 3.80642-3.8428 3.80641z"></path>
            </svg>
            <span>Search project</span>
          </div>
          <div class="avatar-btn">
            <span class="avatar" aria-hidden="true"></span>
          </div>
        </div>
      </div>
    </header>

    <section id="notificationBanner" class="notification-banner" aria-label="Notification-banner">
      <div class="banner-main">
        <div class="banner-message">
          <span class="notify-icon" aria-hidden="true"></span>
          <span>新版本上线：支持修改项目名称和 ID，让你的作品更个性化！</span>
        </div>
        <button id="updateExperienceBtn" class="update-btn" type="button">更新体验</button>
      </div>

      <button id="closeBannerBtn" class="close-btn" type="button" aria-label="close-button">
        <svg viewBox="0 0 14 14" aria-hidden="true" focusable="false">
          <path d="M8.41425 7.00022l5.293-5.29303c0.391-0.39 0.391-1.02394 0-1.41394-0.391-0.391-1.023-0.391-1.414 0l-5.293 5.29297-5.293-5.29297c-0.391-0.391-1.023-0.391-1.414 0-0.391 0.39-0.391 1.02394 0 1.41394l5.293 5.29303-5.293 5.29303c-0.391 0.39-0.391 1.02394 0 1.41394 0.195 0.195 0.451 0.29303 0.707 0.29303 0.256 0 0.512-0.09803 0.707-0.29303l5.293-5.29297 5.293 5.29297c0.195 0.195 0.451 0.29303 0.707 0.29303 0.256 0 0.512-0.09803 0.707-0.29303 0.391-0.39 0.391-1.02394 0-1.41394l-5.293-5.29303z"></path>
        </svg>
      </button>
    </section>

    <main class="content">
      <section class="note-panel" aria-label="设计说明">
        <h1 class="note-title">设计说明</h1>
        <p class="note-text">新功能上线需要用户刷新时，出现该横幅通知。
点击「更新体验」按钮可直接刷新当前界面，刷新后该横幅消失。（「更新体验」按钮为 small（26） 尺寸的 button）
点击右侧「关闭」按钮，可关闭当前横幅。

左侧的消息图标为微动效 icon。

wenjiangping-2026/02/28</p>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var banner = document.getElementById('notificationBanner');
      var closeBtn = document.getElementById('closeBannerBtn');
      var updateBtn = document.getElementById('updateExperienceBtn');
      var hideOnceKey = 'notification-banner-hide-once';
      var shouldHideAfterUpdate = sessionStorage.getItem(hideOnceKey) === '1';

      if (shouldHideAfterUpdate) {
        banner.classList.add('is-hidden');
        sessionStorage.removeItem(hideOnceKey);
      }

      closeBtn.addEventListener('click', function () {
        banner.classList.add('is-hidden');
      });

      updateBtn.addEventListener('click', function () {
        sessionStorage.setItem(hideOnceKey, '1');
        window.location.reload();
      });
    })();
  </script>
</body>
</html>
