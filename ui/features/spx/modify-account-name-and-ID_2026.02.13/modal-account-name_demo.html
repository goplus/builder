<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户个人主页及信息编辑系统</title>
  
  <!-- 1. 引入 Tailwind CSS 引擎库，用于渲染样式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. 配置 Import Map，告诉浏览器去哪里下载 React 和 图标库 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  
  <!-- 3. 引入 Babel，它的作用是将 React 的 JSX 语法实时翻译成浏览器能看懂的普通 JavaScript -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- 网页的内容会挂载到这个 div 里面 -->
  <div id="root"></div>

  <!-- 注意这里 type="text/babel" 和 data-type="module" 非常重要 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Camera, X, Check, ChevronRight, Search, Plus, Copy, 
      Calendar, Heart, Globe, AlertCircle, ArrowRight, Folder, 
      UserCheck, Users 
    } from 'lucide-react';

    // --- 以下是你之前的完整 React 逻辑 ---

    const INITIAL_DATA = {
      name: "Tom Chang",
      id: "78654854",
      bio: "All the world's a stage, and all the men and women merely players. They have their exits and their entrances; and one man in his time plays many parts.",
      avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix",
      joinedAt: "Joined November 2025"
    };

    function App() {
      const [profile, setProfile] = useState(INITIAL_DATA);
      const [activeModal, setActiveModal] = useState('none');
      const [editState, setEditState] = useState({ ...profile });
      const [tempAvatar, setTempAvatar] = useState(null);
      const [cropPos, setCropPos] = useState({ x: 0, y: 0 });
      const [zoom, setZoom] = useState(1);

      const fileInputRef = useRef(null);
      const imageRef = useRef(null);
      const cropContainerRef = useRef(null);

      const handleIdConfirm = (newId) => {
        if (!/^\d+$/.test(newId)) return;
        setEditState(prev => ({ ...prev, id: newId }));
        setActiveModal('profile-edit');
      };

      const handleFinalSave = () => {
        setProfile(editState);
        setActiveModal('none');
      };

      const onAvatarSelect = (e) => {
        const file = e.target.files?.[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = () => {
            setTempAvatar(reader.result);
            setZoom(1);
            setCropPos({ x: 0, y: 0 });
            setActiveModal('avatar-crop');
          };
          reader.readAsDataURL(file);
        }
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      useEffect(() => {
        const el = cropContainerRef.current;
        if (!el || activeModal !== 'avatar-crop') return;

        const handleWheel = (e) => {
          e.preventDefault(); 
          const delta = e.deltaY > 0 ? -0.1 : 0.1;
          setZoom(prev => Math.min(Math.max(0.1, prev + delta), 5));
        };

        el.addEventListener('wheel', handleWheel, { passive: false });
        return () => el.removeEventListener('wheel', handleWheel);
      }, [activeModal]);

      const getCroppedImg = () => {
        if (!imageRef.current) return;
        const canvas = document.createElement('canvas');
        const size = 282; 
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const img = imageRef.current;
        
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
        ctx.clip();
        
        ctx.translate(size/2, size/2);
        ctx.translate(cropPos.x, cropPos.y);
        ctx.scale(zoom, zoom);
        ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);

        setEditState({ ...editState, avatar: canvas.toDataURL('image/png') });
        setActiveModal('profile-edit');
      };

      return (
        <div className="min-h-screen bg-[#f6f8fa] font-sans text-[#24292f]">
          {/* --- 顶部导航栏 --- */}
          <nav className="h-[50px] bg-[#24292f] flex items-center justify-between px-6 sticky top-0 z-10">
            <div className="flex items-center gap-4">
              <div className="text-white font-bold text-[18px] italic flex items-center tracking-tight">
                <div className="w-[28px] h-[28px] bg-[#0bc0cf] rounded-[6px] mr-2 flex items-center justify-center font-black">X</div>
                XBuilder
              </div>
              <div className="h-5 w-[1px] bg-white/20 mx-1" />
              <button className="flex items-center text-white/90 text-sm gap-1 hover:bg-white/10 px-2 py-1 rounded transition-colors">
                <Plus size={16} /> <ChevronRight size={14} className="rotate-90 opacity-50" />
              </button>
            </div>
            
            <div className="flex items-center gap-4 flex-1 justify-end max-w-2xl">
              <div className="relative w-full max-w-sm">
                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={14} />
                <input 
                  type="text" 
                  placeholder="Search project" 
                  className="w-full h-[32px] bg-[#ffffff1a] border border-white/10 rounded-[8px] pl-9 pr-4 text-[13px] text-white focus:outline-none focus:bg-white/20 transition-all placeholder:text-gray-400"
                />
              </div>
              <img src={profile.avatar} className="w-[28px] h-[28px] rounded-full border-[1.5px] border-white/20 object-cover cursor-pointer" alt="avatar" />
            </div>
          </nav>

          <main className="max-w-[1240px] mx-auto pt-6 px-4 pb-20">
            {/* --- 用户头部卡片 --- */}
            <div className="bg-white rounded-[20px] overflow-hidden shadow-sm mb-6 border border-[#eaeff3]">
              <div className="h-[200px] relative overflow-hidden bg-gradient-to-r from-gray-900 via-slate-800 to-black">
                <div className="absolute -top-32 -left-10 w-[500px] h-[500px] rounded-full bg-[#f97316] opacity-30 blur-[100px]" />
              </div>
              
              <div className="px-8 pb-8 flex items-start gap-6 relative">
                <div className="-mt-[76px] shrink-0">
                  <img 
                    src={profile.avatar} 
                    className="w-[152px] h-[152px] rounded-full border-[4px] border-white bg-white shadow-sm object-cover" 
                    alt="Profile" 
                  />
                </div>
                <div className="flex-1 flex justify-between items-end pt-4">
                  <div className="flex flex-col gap-2">
                    <div className="flex items-center gap-4">
                      <h1 className="text-[24px] font-bold text-[#24292f]">{profile.name}</h1>
                      <span className="flex items-center gap-1 font-medium text-[12px] text-[#8c959f] px-2 py-0.5 rounded border border-[#eaeff3]">
                        ID {profile.id} <Copy size={12} className="cursor-pointer hover:text-[#0bc0cf]" />
                      </span>
                      <span className="flex items-center gap-1 text-[13px] text-[#8c959f]">
                        <Calendar size={14} /> {profile.joinedAt}
                      </span>
                    </div>
                    <p className="text-[#57606a] text-[14px] leading-relaxed max-w-[800px]">{profile.bio}</p>
                  </div>
                  <button 
                    onClick={() => { setEditState({...profile}); setActiveModal('profile-edit'); }}
                    className="bg-[#0bc0cf] text-white px-5 py-[9px] rounded-[10px] shadow-[0_3px_0_#0B8893] active:translate-y-1 active:shadow-none transition-all text-[14px] font-medium shrink-0"
                  >
                    Edit profile
                  </button>
                </div>
              </div>
            </div>

            {/* --- 下方内容区 --- */}
            <div className="flex gap-6 items-start">
              <div className="w-[212px] bg-white rounded-[20px] p-2 flex flex-col gap-1 shadow-sm border border-[#eaeff3]">
                <SidebarItem icon={<Globe size={18}/>} label="Overview" active />
                <SidebarItem icon={<Folder size={18}/>} label="Projects" />
                <SidebarItem icon={<Heart size={18}/>} label="Likes" />
                <SidebarItem icon={<UserCheck size={18}/>} label="Following" />
                <SidebarItem icon={<Users size={18}/>} label="Followers" />
              </div>

              <div className="flex-1 space-y-6">
                <ProjectSection title="My projects" />
                <ProjectSection title="Projects I like" />
              </div>
            </div>
          </main>

          {/* --- 弹窗系统 --- */}
          {activeModal !== 'none' && (
            <div className="fixed inset-0 bg-[#24292f14] backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
              
              {/* 1. 个人信息编辑弹窗 */}
              {activeModal === 'profile-edit' && (
                <div className="bg-white w-full max-w-[560px] rounded-[12px] shadow-[0_4px_21px_rgba(36,41,47,0.08)] animate-in fade-in zoom-in duration-200 overflow-hidden">
                  <ModalHeader title="编辑个人主页" onClose={() => setActiveModal('none')} />
                  <div className="p-0">
                    <div className="relative h-[168px] bg-gradient-to-r from-[#ffafcc]/60 via-[#e0c3fc]/60 to-[#8aebf1]/60 border-b border-[#eaeff3]">
                      <div className="absolute left-6 -bottom-[60px] z-10">
                        <div 
                          onClick={() => fileInputRef.current.click()}
                          className="w-[120px] h-[120px] rounded-full border-[3px] border-white shadow-[0_4px_10px_rgba(0,0,0,0.06)] relative cursor-pointer overflow-hidden bg-white group"
                        >
                          <img src={editState.avatar} className="w-full h-full object-cover transition-opacity group-hover:opacity-90" alt="Avatar" />
                          <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <div className="w-10 h-10 bg-black/40 rounded-full flex items-center justify-center text-white border border-white/20">
                              <Camera size={18} strokeWidth={2} />
                            </div>
                          </div>
                        </div>
                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={onAvatarSelect} />
                      </div>
                    </div>

                    <div className="px-6 pt-[80px] pb-8 space-y-6">
                      <InputGroup label="姓名">
                        <input 
                          className="w-full h-8 bg-[#f6f8fa] border border-[#eaeff3] rounded-[12px] px-3 text-[#24292f] text-[14px] focus:outline-none focus:border-[#0bc0cf] transition-colors"
                          value={editState.name}
                          onChange={e => setEditState({...editState, name: e.target.value})}
                        />
                      </InputGroup>

                      <div className="space-y-[6px]">
                        <label className="text-[13px] text-[#6e7781] font-medium block">ID</label>
                        <div className="flex gap-3 items-center">
                          <div className="flex-1 h-8 bg-[#f6f8fa] border border-[#eaeff3] rounded-[12px] px-3 flex items-center text-[#a7b1bb] text-[14px]">
                            {editState.id}
                          </div>
                          <button 
                            onClick={() => setActiveModal('id-warning')}
                            className="bg-[#0bc0cf] text-white px-5 h-8 rounded-[12px] shadow-[0_2px_0_#0B8893] active:translate-y-[2px] active:shadow-none transition-all text-[14px] font-medium"
                          >
                            编辑
                          </button>
                        </div>
                      </div>

                      <InputGroup label="简介">
                        <textarea 
                          className="w-full h-24 bg-[#f6f8fa] border border-[#eaeff3] rounded-[12px] p-3 text-[#24292f] text-[14px] focus:outline-none focus:border-[#0bc0cf] transition-colors resize-none leading-relaxed"
                          value={editState.bio}
                          onChange={e => setEditState({...editState, bio: e.target.value})}
                        />
                      </InputGroup>
                    </div>
                  </div>
                  <div className="px-6 pt-5 pb-6 flex justify-end gap-3 bg-white border-t border-[#eaeff3]">
                    <button 
                      onClick={() => setActiveModal('none')}
                      className="bg-[#eaeff3] text-[#57606a] px-6 py-1.5 rounded-[12px] font-medium text-[14px] hover:bg-[#e1e7ec] transition-colors"
                    >
                      取消
                    </button>
                    <button 
                      onClick={handleFinalSave}
                      className="bg-[#0bc0cf] text-white px-6 py-1.5 rounded-[12px] font-medium text-[14px] shadow-[0_2px_0_#0B8893] active:translate-y-[2px] active:shadow-none transition-all"
                    >
                      确认
                    </button>
                  </div>
                </div>
              )}

              {/* 2. 修改 ID 提醒弹窗 */}
              {activeModal === 'id-warning' && (
                <div className="bg-white w-full max-w-[560px] rounded-[12px] shadow-2xl overflow-hidden border border-[#eaeff3]">
                  <ModalHeader title="修改账号 ID" onClose={() => setActiveModal('profile-edit')} />
                  <div className="px-6 pt-6 pb-8 space-y-5">
                    <div className="flex gap-2 items-start bg-white border border-[#eaeff3] p-4 rounded-[12px]">
                      <AlertCircle className="shrink-0 mt-0.5 text-[#faa135]" size={18} />
                      <div className="text-[#faa135] text-[14px] font-medium">
                        修改账号 ID ，可能造成以下影响，请谨慎操作。
                      </div>
                    </div>
                    
                    <div className="text-[#6e7781] text-[14px] leading-[1.8] flex flex-col gap-[6px] px-2">
                      <p>· 我们不会为您的旧个人主页设置重定向。</p>
                      <p>· 我们不会为 Pages 网站设置重定向。</p>
                      <p>· 我们将为您的存储库（包括网页访问和 Git 访问）创建重定向。</p>
                      <p>· 重命名操作可能需要几分钟才能完成</p>
                    </div>
                  </div>

                  <div className="px-6 pb-[32px] flex justify-center bg-white">
                    <button 
                      onClick={() => setActiveModal('id-input')}
                      className="bg-[#ef4149] text-white px-10 py-[10px] rounded-[12px] font-medium text-[14px] shadow-[0_4px_0_#bc292e] active:translate-y-[4px] active:shadow-none transition-all"
                    >
                      我已知晓，让我更改账号 ID
                    </button>
                  </div>
                </div>
              )}

              {/* 3. 修改 ID 输入弹窗 */}
              {activeModal === 'id-input' && (
                <div className="bg-white w-full max-w-[560px] rounded-[12px] shadow-2xl overflow-hidden border border-[#eaeff3]">
                  <ModalHeader title="修改账号 ID" onClose={() => setActiveModal('profile-edit')} />
                  <div className="px-6 pt-6 pb-8 space-y-3">
                    <input 
                      type="text"
                      defaultValue={editState.id}
                      id="new-id-input"
                      className="w-full h-8 bg-[#f6f8fa] border border-[#eaeff3] rounded-[12px] px-3 text-[14px] focus:outline-none focus:border-[#0bc0cf] transition-colors"
                    />
                    <p className="text-[13px] text-[#6e7781] px-1">项目 ID 只能包含数字</p>
                  </div>
                  <div className="px-6 pt-5 pb-6 flex justify-end gap-3 border-t border-[#eaeff3]">
                     <button 
                      onClick={() => setActiveModal('profile-edit')}
                      className="bg-[#eaeff3] text-[#57606a] px-6 py-1.5 rounded-[12px] font-medium text-[14px] hover:bg-[#e1e7ec] transition-colors"
                    >取消</button>
                    <button 
                      onClick={() => handleIdConfirm(document.getElementById('new-id-input').value)}
                      className="bg-[#0bc0cf] text-white px-6 py-1.5 rounded-[12px] font-medium text-[14px] shadow-[0_2px_0_#0B8893] active:translate-y-[2px] active:shadow-none transition-all"
                    >确认</button>
                  </div>
                </div>
              )}

              {/* 4. 头像上传裁剪 */}
              {activeModal === 'avatar-crop' && (
                <div className="bg-white w-full max-w-[560px] rounded-[12px] shadow-2xl overflow-hidden">
                  <ModalHeader title="裁剪图像" onClose={() => setActiveModal('profile-edit')} />
                  <div className="px-6 py-8 flex flex-col items-center justify-center bg-white">
                    <div 
                      ref={cropContainerRef}
                      className="w-[300px] h-[300px] relative overflow-hidden cursor-move select-none rounded-[10px] bg-[#f6f8fa] border border-[#eaeff3]"
                      onMouseDown={(e) => {
                        const startX = e.clientX - cropPos.x;
                        const startY = e.clientY - cropPos.y;
                        const move = (me) => setCropPos({ x: me.clientX - startX, y: me.clientY - startY });
                        const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
                        window.addEventListener('mousemove', move);
                        window.addEventListener('mouseup', up);
                      }}
                    >
                      <img 
                        ref={imageRef}
                        src={tempAvatar} 
                        style={{ 
                          transform: `translate(calc(-50% + ${cropPos.x}px), calc(-50% + ${cropPos.y}px)) scale(${zoom})`,
                          left: '50%',
                          top: '50%',
                        }}
                        className="absolute max-w-none transition-none origin-center"
                        alt="裁剪源图像" 
                        draggable={false}
                      />
                      <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div 
                          className="w-[282px] h-[282px] rounded-full border-[1.5px] border-white"
                          style={{ boxShadow: '0 0 0 999px rgba(246,248,250,0.85)' }} 
                        />
                      </div>
                    </div>
                  </div>
                  <div className="px-6 pt-5 pb-6 flex justify-end gap-3 border-t border-[#eaeff3] bg-white">
                    <button 
                      onClick={() => setActiveModal('profile-edit')} 
                      className="bg-[#eaeff3] text-[#57606a] px-6 py-1.5 rounded-[12px] font-medium text-[14px] hover:bg-[#e1e7ec] transition-colors"
                    >
                      取消
                    </button>
                    <button 
                      onClick={getCroppedImg} 
                      className="bg-[#0bc0cf] text-white px-6 py-1.5 rounded-[12px] font-medium text-[14px] shadow-[0_2px_0_#0B8893] active:translate-y-[2px] active:shadow-none transition-all"
                    >
                      确认
                    </button>
                  </div>
                </div>
              )}

            </div>
          )}
        </div>
      );
    }

    // --- 辅助组件 ---
    function SidebarItem({ icon, label, active = false }) {
      return (
        <div className={`flex items-center gap-3 px-3 py-[10px] rounded-[10px] cursor-pointer transition-all ${
          active ? 'bg-[#F3FCFD] text-[#0bc0cf]' : 'hover:bg-[#f6f8fa] text-[#6e7781]'
        }`}>
          <span className={`w-[20px] h-[20px] flex items-center justify-center ${active ? 'text-[#0bc0cf]' : 'text-[#a7b1bb]'}`}>{icon}</span>
          <span className="text-[13px] font-medium flex-1">{label}</span>
          {active && <ChevronRight size={14} className="text-[#0bc0cf]" />}
        </div>
      );
    }

    function ProjectSection({ title }) {
      const cards = [1, 2, 3, 4];
      return (
        <div className="bg-white rounded-[20px] p-6 shadow-sm border border-[#eaeff3]">
          <div className="flex justify-between items-center mb-5">
            <h2 className="text-[18px] font-bold text-[#24292f]">{title}</h2>
            <button className="text-[#0bc0cf] text-[13px] font-medium flex items-center gap-1 hover:underline">
              View all <ArrowRight size={14} />
            </button>
          </div>
          <div className="grid grid-cols-4 gap-5">
            {cards.map(i => (
              <div key={i} className="border border-[#eaeff3] rounded-[12px] overflow-hidden bg-white hover:shadow-md transition-shadow cursor-pointer">
                <div className="h-[160px] bg-[#f6f8fa] relative flex items-center justify-center border-b border-[#eaeff3]/50">
                   <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(#0bc0cf 1px, transparent 1px)', backgroundSize: '16px 16px' }} />
                </div>
                <div className="p-4 bg-white">
                  <div className="flex items-center gap-1.5 mb-2.5">
                    <h4 className="text-[14px] font-semibold text-[#24292f] truncate">Space Werewolf</h4>
                    <div className="w-4 h-4 rounded-full bg-[#219ffc] flex items-center justify-center text-white shrink-0">
                      <Check size={10} strokeWidth={3} />
                    </div>
                  </div>
                  <div className="flex items-center gap-3 text-[12px] text-[#8c959f]">
                    <span className="flex items-center gap-1.5"><Heart size={12} className="fill-[#8c959f] text-[#8c959f]" /> 899K</span>
                    <span>22 hours ago</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ModalHeader({ title, onClose }) {
      return (
        <div className="h-14 border-b border-[#eaeff3] flex items-center justify-between px-6 bg-white shrink-0">
          <span className="text-[15px] font-bold text-[#24292f]">{title}</span>
          <button onClick={onClose} className="w-7 h-7 flex items-center justify-center rounded-full border border-[#eaeff3] text-[#a7b1bb] hover:bg-gray-50 transition-colors">
            <X size={16} />
          </button>
        </div>
      );
    }

    function InputGroup({ label, children }) {
      return (
        <div className="space-y-[6px] w-full">
          <label className="text-[13px] text-[#6e7781] font-medium block">{label}</label>
          {children}
        </div>
      );
    }

    // --- 最后：将 App 组件渲染到页面上的 root 节点 ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
